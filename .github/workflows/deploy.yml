name: Deploy ScorePop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject credentials
        run: |
          sed -i "s|BURAYA_URL|${{ secrets.SUPABASE_URL }}|g" config.js
          sed -i "s|BURAYA_KEY|${{ secrets.SUPABASE_KEY }}|g" config.js
          sed -i "s|BURAYA_PAYMENT_URL|${{ secrets.PAYMENT_EDGE_URL }}|g" index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,*.yml,*.md'

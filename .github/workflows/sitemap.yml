name: Sitemap Güncelle

on:
  schedule:
    # Maç öncesi saatler — sabah, öğle, akşam ve gece yarısı
    - cron: '0 4,8,12,16,20 * * *'   # 07:00, 11:00, 15:00, 19:00, 23:00 (TR)
  workflow_dispatch:   # Manuel tetikleme için

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sitemap oluştur
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node sitemap-gen.js

      - name: Değişiklikleri commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: sitemap güncellendi "
          git push

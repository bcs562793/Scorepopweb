<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Haber Detayı — ScorePop</title>
  <meta name="description" content="ScorePop spor haberleri detay sayfası."/>
  <meta name="robots" content="index,follow"/>
  <link rel="canonical" href="https://scorepop.com.tr/haberler"/>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JS4J2RCJJ9"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JS4J2RCJJ9');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0b0d11;--bg2:#0f1218;--bg3:#141921;--bg4:#1a2030;--b1:rgba(255,255,255,.05);--b2:rgba(255,255,255,.08);--b3:rgba(255,255,255,.12);--tx1:#dde4ef;--tx2:#8899b0;--tx3:#4a5a70;--or:#f26419;--or2:rgba(242,100,25,.15);--or-glow:rgba(242,100,25,.35)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--tx1);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:16px;padding:0 24px;height:52px}
    .topbar-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--tx1)}
    .topbar-mark{width:30px;height:30px;background:var(--or);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px var(--or-glow);overflow:hidden;flex-shrink:0}
    .topbar-mark img{width:30px;height:30px;object-fit:cover}
    .topbar-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.5px}
    .topbar-title em{color:var(--or);font-style:normal}
    .topbar-back{margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--tx2);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;border:1px solid var(--b2);transition:all .2s}
    .topbar-back:hover{color:var(--tx1);border-color:var(--b3);background:var(--bg3)}
    .page-wrap{max-width:900px;margin:0 auto;padding:32px 20px 60px}
    
    /* Haber Detay Stilleri */
    .haber-header { margin-bottom: 24px; border-bottom: 1px solid var(--b1); padding-bottom: 24px; }
    .haber-header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; color: var(--tx1); line-height: 1.2; margin-bottom: 16px; }
    .haber-meta { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--tx3); flex-wrap: wrap; }
    .haber-tag { background: var(--or2); color: var(--or); border: 1px solid var(--or); border-radius: 20px; padding: 4px 12px; font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: .4px; }
    .haber-kapak { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 32px; background: var(--bg3); }
    .haber-kapak img { width: 100%; height: auto; display: block; max-height: 500px; object-fit: cover; }
    .haber-icerik { font-size: 16px; line-height: 1.8; color: var(--tx1); }
    .haber-icerik p { margin-bottom: 20px; }
    .haber-icerik img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
    .haber-icerik a { color: var(--or); text-decoration: none; }
    .haber-icerik a:hover { text-decoration: underline; }

    /* Yükleniyor / Hata Stilleri */
    .skeleton{background:var(--bg3);border-radius:8px;animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .sk-title { height: 40px; width: 70%; margin-bottom: 16px; }
    .sk-meta { height: 20px; width: 30%; margin-bottom: 24px; }
    .sk-img { height: 400px; width: 100%; margin-bottom: 32px; border-radius: 12px; }
    .sk-text { height: 16px; width: 100%; margin-bottom: 12px; }
    .sk-text.short { width: 80%; }
    
    .err{text-align:center;padding:60px 20px;color:var(--tx2)}
    .err-icon{font-size:40px;margin-bottom:12px}
    
    footer{text-align:center;padding:32px 20px;color:var(--tx3);font-size:13px;border-top:1px solid var(--b1)}
    footer a{color:var(--tx2);text-decoration:none}
    footer a:hover{color:var(--or)}
  </style>
</head>
<body>
<nav class="topbar">
  <a class="topbar-brand" href="/">
    <div class="topbar-mark"><img src="https://i.hizliresim.com/gbleupf.png" alt="ScorePop Logo"/></div>
    <div class="topbar-title">SCORE<em>POP</em></div>
  </a>
  <a class="topbar-back" href="/haberler">← Haberlere Dön</a>
</nav>

<div class="page-wrap">
  <div id="haber-detay">
    <div class="skeleton sk-title"></div>
    <div class="skeleton sk-meta"></div>
    <div class="skeleton sk-img"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-text short"></div>
  </div>
</div>

<footer>
  <p>&copy; 2026 ScorePop — <a href="/">Ana Sayfa</a> · <a href="/haberler">Haberler</a> · <a href="/hakkimizda">Hakkımızda</a> · <a href="/iletisim">İletişim</a></p>
</footer>

<script>
(function() {
  'use strict';
  
  // URL'den slug değerini al (Örn: scorepop.com.tr/haber/fenerbahce-maci-ozeti -> slug = fenerbahce-maci-ozeti)
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const slug = pathParts[pathParts.length - 1];
  const detayKutusu = document.getElementById('haber-detay');

  function fmtDate(str) {
    try {
      const d = new Date(str);
      const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    } catch { return ''; }
  }

  async function fetchArticle() {
    // Eğer slug yoksa veya hala ana dizindeyse hata ver
    if (!slug || slug === 'haber') {
      detayKutusu.innerHTML = '<div class="err"><div class="err-icon">⚠️</div><p>Haber bulunamadı. Lütfen geçerli bir haber bağlantısı kullanın.</p></div>';
      return;
    }

    try {
      // Slug parametresine göre API'ye istek atıyoruz
      const res = await fetch(`/api/haberler?slug=${slug}`);
      if (!res.ok) throw new Error('API hatası: ' + res.status);
      
      const data = await res.json();
      
      // API'den dönen veri dizi ise ilk elemanı alıyoruz, obje ise direkt kendisini kullanıyoruz
      const haber = Array.isArray(data) ? data[0] : data;

      if (!haber) {
        detayKutusu.innerHTML = '<div class="err"><div class="err-icon">📭</div><p>Aradığınız haber bulunamadı veya yayından kaldırılmış olabilir.</p></div>';
        return;
      }

      // Sayfa başlığını güncelliyoruz
      document.title = (haber.baslik || 'Haber Detayı') + ' — ScorePop';

      // Haberi Ekrana Basıyoruz
      detayKutusu.innerHTML = `
        <div class="haber-header">
          <h1>${haber.baslik || ''}</h1>
          <div class="haber-meta">
            <span class="haber-tag">${haber.kategori || 'Genel'}</span>
            <span>${fmtDate(haber.yayin_tarihi)}</span>
          </div>
        </div>
        ${haber.kapak_url ? `<div class="haber-kapak"><img src="${haber.kapak_url}" alt="${haber.baslik || ''}" /></div>` : ''}
        <div class="haber-icerik">
          ${haber.icerik || haber.ozet || ''}
        </div>
      `;
      
    } catch(e) {
      detayKutusu.innerHTML = `<div class="err"><div class="err-icon">⚠️</div><p>Haber yüklenirken bir sorun oluştu.<br><small>${e.message}</small></p></div>`;
    }
  }

  // Fonksiyonu çalıştır
  fetchArticle();
})();
</script>
</body>
</html>

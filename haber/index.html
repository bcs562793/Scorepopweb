<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Haber — ScorePop</title>
  <meta name="robots" content="index,follow"/>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JS4J2RCJJ9"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JS4J2RCJJ9');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0b0d11;--bg2:#0f1218;--bg3:#141921;--bg4:#1a2030;--b1:rgba(255,255,255,.05);--b2:rgba(255,255,255,.08);--b3:rgba(255,255,255,.12);--tx1:#dde4ef;--tx2:#8899b0;--tx3:#4a5a70;--or:#f26419;--or2:rgba(242,100,25,.15);--or-glow:rgba(242,100,25,.35)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--tx1);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:16px;padding:0 24px;height:52px}
    .topbar-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--tx1)}
    .topbar-mark{width:30px;height:30px;background:var(--or);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px var(--or-glow);overflow:hidden;flex-shrink:0}
    .topbar-mark img{width:30px;height:30px;object-fit:cover}
    .topbar-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.5px}
    .topbar-title em{color:var(--or);font-style:normal}
    .topbar-back{margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--tx2);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;border:1px solid var(--b2);transition:all .2s}
    .topbar-back:hover{color:var(--tx1);border-color:var(--b3);background:var(--bg3)}
    .page-wrap{max-width:800px;margin:0 auto;padding:32px 20px 60px}
    .hero-img{width:100%;max-height:420px;object-fit:cover;border-radius:12px;margin-bottom:28px;display:block}
    .haber-meta{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .meta-tag{background:var(--or2);color:var(--or);border:1px solid var(--or);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
    .meta-date{color:var(--tx2);font-size:13px}
    .meta-author{color:var(--tx3);font-size:13px}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,5vw,38px);font-weight:800;line-height:1.2;margin-bottom:16px;color:var(--tx1)}
    .ozet{font-size:16px;color:var(--tx2);border-left:3px solid var(--or);padding-left:16px;margin-bottom:28px;line-height:1.8}
    .icerik{font-size:15px;color:var(--tx1);line-height:1.9;margin-bottom:32px}
    .kaynak-btn{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--b2);color:var(--tx2);text-decoration:none;padding:10px 18px;border-radius:8px;font-size:13px;transition:all .2s}
    .kaynak-btn:hover{border-color:var(--or);color:var(--or);background:var(--or2)}
    /* Skeleton */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .sk{background:var(--bg3);border-radius:6px;animation:pulse 1.4s ease-in-out infinite}
    .sk-hero{width:100%;height:340px;border-radius:12px;margin-bottom:28px}
    .sk-line{height:16px;margin-bottom:12px}
    /* Error */
    .err{text-align:center;padding:80px 20px;color:var(--tx2)}
    .err-icon{font-size:48px;margin-bottom:16px}
    footer{text-align:center;padding:32px 20px;color:var(--tx3);font-size:13px;border-top:1px solid var(--b1)}
    footer a{color:var(--tx2);text-decoration:none}
    footer a:hover{color:var(--or)}
  </style>
</head>
<body>
<nav class="topbar">
  <a class="topbar-brand" href="/">
    <div class="topbar-mark"><img src="https://i.hizliresim.com/gbleupf.png" alt="ScorePop Logo"/></div>
    <div class="topbar-title">SCORE<em>POP</em></div>
  </a>
  <a class="topbar-back" href="/haberler">← Haberler</a>
</nav>

<div class="page-wrap" id="content">
  <!-- skeleton -->
  <div class="sk sk-hero"></div>
  <div class="sk sk-line" style="width:40%"></div>
  <div class="sk sk-line" style="width:80%;height:32px;margin-bottom:20px"></div>
  <div class="sk sk-line" style="width:100%"></div>
  <div class="sk sk-line" style="width:95%"></div>
  <div class="sk sk-line" style="width:88%"></div>
</div>

<footer>
  <p>&copy; 2026 ScorePop — <a href="/">Ana Sayfa</a> · <a href="/haberler">Haberler</a> · <a href="/hakkimizda">Hakkımızda</a> · <a href="/iletisim">İletişim</a></p>
</footer>

<script>
const SUPABASE_URL = 'https://qyebmwiuvrmfxlgdaarc.supabase.co';
const ANON_KEY    = 'sb_publishable_AL5OMxT8SzcNnxslOt9YSg_3j0qYkL5';

function fmtDate(str) {
  try {
    const d = new Date(str);
    const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch { return ''; }
}

// URL'den slug'ı çıkar: /haber/some-slug → some-slug
function getSlug() {
  const parts = window.location.pathname.replace(/\/$/, '').split('/');
  return parts[parts.length - 1];
}

async function loadHaber() {
  const slug = getSlug();
  if (!slug || slug === 'haber') {
    window.location.replace('/haberler');
    return;
  }

  const res = await fetch(`/api/haberler?limit=${PAGE_SIZE}&offset=${offset}`);
    if (!res.ok) throw new Error('API hatası');
    const data = await res.json();
    if (!data.length) throw new Error('not_found');
    render(data[0]);
  } catch(e) {
    const msg = e.message === 'not_found'
      ? '<div class="err-icon">🔍</div><p>Haber bulunamadı.</p><br><a href="/haberler" style="color:var(--or)">← Haberlere dön</a>'
      : `<div class="err-icon">⚠️</div><p>Haber yüklenemedi.<br><small>${e.message}</small></p>`;
    document.getElementById('content').innerHTML = `<div class="err">${msg}</div>`;
  }
}

function render(h) {
  // Meta etiketlerini güncelle
  document.title = `${h.baslik} — ScorePop`;
  setMeta('description', h.ozet || '');
  setOG('og:title', h.baslik + ' — ScorePop');
  setOG('og:description', h.ozet || '');
  setOG('og:image', h.kapak_url || '');
  setOG('og:url', 'https://scorepop.com.tr/haber/' + h.slug);
  setOG('og:type', 'article');
  setCanonical('https://scorepop.com.tr/haber/' + h.slug);

  document.getElementById('content').innerHTML = `
    ${h.kapak_url ? `<img class="hero-img" src="${esc(h.kapak_url)}" alt="${esc(h.baslik)}" onerror="this.style.display='none'"/>` : ''}
    <div class="haber-meta">
      <span class="meta-tag">${esc(h.kategori||'Genel')}</span>
      <span class="meta-date">${fmtDate(h.yayin_tarihi)}</span>
      ${h.yazar ? `<span class="meta-author">· ${esc(h.yazar)}</span>` : ''}
    </div>
    <h1>${esc(h.baslik||'')}</h1>
    ${h.ozet ? `<p class="ozet">${esc(h.ozet)}</p>` : ''}
    ${h.icerik ? `<div class="icerik">${h.icerik}</div>` : ''}
    ${h.kaynak_url ? `<a class="kaynak-btn" href="${esc(h.kaynak_url)}" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M6 2H2.5A1.5 1.5 0 001 3.5v8A1.5 1.5 0 002.5 13h8A1.5 1.5 0 0012 11.5V8M8.5 1H13m0 0v4.5M13 1L6 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Kaynağa Git (Mackolik)
    </a>` : ''}
  `;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setMeta(name, content) {
  let el = document.querySelector(`meta[name="${name}"]`);
  if (!el) { el = document.createElement('meta'); el.name = name; document.head.appendChild(el); }
  el.content = content;
}
function setOG(prop, content) {
  let el = document.querySelector(`meta[property="${prop}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute('property', prop); document.head.appendChild(el); }
  el.content = content;
}
function setCanonical(href) {
  let el = document.querySelector('link[rel="canonical"]');
  if (!el) { el = document.createElement('link'); el.rel = 'canonical'; document.head.appendChild(el); }
  el.href = href;
}

loadHaber();
</script>
</body>
</html>

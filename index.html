<!-- 404.html redirect trick: ?p=/mac/123 → gerçek URL -->
<script>
(function() {
  var sp = new URLSearchParams(window.location.search);
  var p  = sp.get('p');
  if (p) {
    // Güvenlik: sadece / ile başlayan relative path'e izin ver
    if (!/^\/[^/]/.test(p) && p !== '/') {
      p = '/';
    }
    sp.delete('p');
    var qs = sp.toString();
    history.replaceState(null, '', p + (qs ? '?' + qs : ''));
  }
})();
</script>

<!-- 🗑 SİL — İLK 1000 ÜYE KAMPANYASI SAYAÇ BAŞLANGICI -->
<script>
/* ── PROMO BANNER KONTENJAN SAYACI ── */
(async function() {
  const el = document.getElementById('promo-slots');
  if (!el) return;
  try {
    // S.sb hazır olana kadar bekle (max 5sn)
    const sb = await new Promise(r => {
      const check = () => { if (window.S?.sb) return r(window.S.sb); setTimeout(check, 200); };
      check();
      setTimeout(() => r(null), 5000);
    });

    if (!sb) { el.textContent = '1.000'; return; }

    const { count } = await sb
      .from('profiles')
      .select('id', { count: 'exact', head: true });

    const kalan = Math.max(0, 1000 - (count || 0));
    el.textContent = kalan.toLocaleString('tr-TR');

    if (kalan === 0) {
      document.getElementById('promo-banner')?.remove();
    }
  } catch(e) {
    el.textContent = '1.000';
  }
})();
</script>

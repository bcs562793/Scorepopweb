<!DOCTYPE html> //v1.0
<html lang="tr">
<head>
<base href="/">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ScorePop — Canlı Maç Sonuçları</title>
<meta name="description" content="Canlı maç skorları, anlık sonuçlar ve istatistikler."/>
<meta name="robots" content="index,follow"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="style.css"/>
<!-- 404.html redirect trick: ?p=/mac/123 → gerçek URL -->
<script>
(function() {
  var sp = new URLSearchParams(window.location.search);
  var p  = sp.get('p');
  if (p) {
    // Güvenlik: sadece / ile başlayan relative path'e izin ver
    if (!/^\/[^/]/.test(p) && p !== '/') {
      p = '/';
    }
    sp.delete('p');
    var qs = sp.toString();
    history.replaceState(null, '', p + (qs ? '?' + qs : ''));
  }
})();
</script>
</head>
<body>

<!-- ── SIDEBAR ───────────────────────────────────── -->
<aside id="sidebar">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-mark">SP</div>
      <div class="sb-name">SCORE<em>POP</em></div>
    </div>
    <div class="sb-live-stat">
      <span class="sb-live-dot"></span>
      <span id="sb-live-n">0</span>
      <span class="sb-live-lbl">maç canlı</span>
    </div>
  </div>

  <nav class="sb-nav">
    <button class="sb-btn active" data-page="live">
      <span class="sb-btn-pip"></span>
      <span>Canlı Maçlar</span>
    </button>
    <button class="sb-btn" data-page="today">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x=".75" y="1.75" width="11.5" height="10.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M.75 5h11.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 .5v2M9 .5v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Bugün</span>
    </button>
    <button class="sb-btn" data-page="upcoming">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 3.5v3l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Yaklaşan</span>
    </button>
  </nav>

  <div class="sb-sep"></div>
  <div class="sb-lbl">LİGLER</div>
  <div id="sb-league-list" class="sb-league-list"></div>

  <div class="sb-bottom">
    <div class="sb-refresh-wrap">
      <svg viewBox="0 0 20 20" class="sb-ring-svg">
        <circle cx="10" cy="10" r="8" class="sb-rt"/>
        <circle cx="10" cy="10" r="8" class="sb-rf" id="sb-ring"/>
      </svg>
      <span class="sb-cd" id="sb-cd">30</span>
    </div>
  </div>
</aside>

<!-- ── MAIN ──────────────────────────────────────── -->
<main id="main">

  <!-- topbar -->
  <header id="topbar">
    <div class="tb-left">
      <button class="tb-menu" onclick="toggleSidebar()">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M0 1h16M0 6h16M0 11h16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="tb-mob-brand">SP</span>
    </div>

    <div class="tb-date" id="date-strip"></div>

    <div class="tb-right">
      <div class="tb-live" id="tb-live">
        <span class="tb-live-dot"></span>
        <b id="tb-live-n">0</b>
        <span>CANLI</span>
      </div>
    </div>
  </header>

  <!-- col headers -->
  <div class="col-hdr" id="col-hdr">
    <div class="ch-time">SAAT</div>
    <div class="ch-home">EV SAHİBİ</div>
    <div class="ch-score">SKOR</div>
    <div class="ch-away">DEPLASMAN</div>
    <div class="ch-x"></div>
  </div>

  <!-- views -->
  <div id="view-matches">
    <div id="matches-root">
      <div class="skel">
        <div class="sk-h"></div><div class="sk-r"></div><div class="sk-r"></div><div class="sk-r"></div>
        <div class="sk-h" style="margin-top:8px"></div><div class="sk-r"></div><div class="sk-r"></div>
      </div>
    </div>
  </div>

  <div id="view-detail" class="hidden">
    <button class="back-btn" id="back-btn">← Maç Listesi</button>
    <div id="detail-root"></div>
  </div>

</main>

<!-- mobile overlay -->
<div id="overlay" onclick="toggleSidebar()"></div>

  <script>
    window.PAYMENT_EDGE_URL = "BURAYA_PAYMENT_URL";
</script>

<script>
/* Uygulama 6 saniyede başlamazsa otomatik yenile */
window._appStarted = false;
window._watchdog = setTimeout(function() {
  if (!window._appStarted) {
    console.warn('[ScorePop] Yükleme zaman aşımı, yenileniyor...');
    window.location.reload();
  }
}, 15000);
</script>
<script src="config.js"></script>
<script src="router.js"></script>
<script src="auth.js"></script>
<script src="forum.js"></script>
<script src="payment.js"></script>
<script src="app.js"></script>
</body>
</html>

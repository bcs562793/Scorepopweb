<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ScorePop — Canlı Maç Sonuçları</title>
<meta name="description" content="Canlı maç skorları, anlık sonuçlar ve istatistikler. Tüm ligleri ScorePop ile takip et."/>
<meta name="robots" content="index,follow"/>
<link rel="canonical" href="https://scorepop.com.tr/"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://scorepop.com.tr/"/>
<meta property="og:title" content="ScorePop — Canlı Maç Sonuçları"/>
<meta property="og:description" content="Canlı maç skorları ve anlık sonuçlar."/>
<meta property="og:image" content="https://scorepop.com.tr/og-image.png"/>
<meta property="og:locale" content="tr_TR"/>
<meta name="twitter:card" content="summary_large_image"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- TOP BAR -->
<header id="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-score">SCORE</span><span class="brand-pop">POP</span>
    </div>

    <nav class="main-nav">
      <button class="nav-btn active" data-page="live">
        <span class="nav-dot"></span>CANLI
      </button>
      <button class="nav-btn" data-page="today">BUGÜN</button>
      <button class="nav-btn" data-page="upcoming">YAKLAŞAN</button>
    </nav>

    <div class="topbar-right">
      <div class="live-counter">
        <span class="live-pulse"></span>
        <span id="live-count">0</span>
        <span class="live-label">CANLI</span>
      </div>
      <div class="refresh-ring" id="refresh-ring">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" class="ring-track"/><circle cx="16" cy="16" r="13" class="ring-fill" id="ring-progress"/></svg>
      </div>
    </div>
  </div>
</header>

<!-- DATE STRIP -->
<div id="date-strip-wrap">
  <div class="date-strip" id="date-strip"></div>
</div>

<!-- LEAGUE FILTER -->
<div id="filter-wrap">
  <div class="filter-scroll" id="filter-bar">
    <button class="league-chip active" data-league="all">Tüm Ligler</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<main id="main">

  <!-- MATCHES VIEW -->
  <div id="view-matches">
    <div id="matches-root">
      <div class="skeleton-wrap">
        <div class="skeleton-league"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-league" style="margin-top:16px"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" class="hidden">
    <button class="back-btn" id="back-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Maç Listesi
    </button>
    <div id="detail-root"></div>
  </div>

</main>

<!-- MOBILE NAV -->
<nav id="mobile-nav">
  <button class="mob-btn active" data-page="live">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="3" fill="currentColor"/>
      <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="9" cy="9" r="9" stroke="currentColor" stroke-width="1" opacity=".4"/>
    </svg>
    <span>Canlı</span>
  </button>
  <button class="mob-btn" data-page="today">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="3" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.3"/>
      <path d="M2 7h14" stroke="currentColor" stroke-width="1.3"/>
      <path d="M6 1v3M12 1v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <span>Bugün</span>
  </button>
  <button class="mob-btn" data-page="upcoming">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.3"/>
      <path d="M9 5v4l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <span>Yaklaşan</span>
  </button>
</nav>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>

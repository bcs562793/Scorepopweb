    /* loading & empty */
    .state-box {
      display: flex; flex-direction: column; align-items: center;

    .spinner {
      width: 32px; height: 32px; border-radius: 50%;

    @media (max-width: 768px) {

      .td-form { display: none; }
      .col-hid { display: none; }

    @media (max-width: 480px) {
      .topbar-sep, .topbar-title { display: none; }
      .topbar-nav { gap: 2px; }
      .topbar-link { padding: 5px 8px; font-size: 12px; }
    }
  </style>

    if (allData.length === 0) {
      document.getElementById('standingsContent').innerHTML =
        `<div class="standings-card"><div class="state-box"><div class="icon">📭</div><p>Henüz puan durumu verisi bulunmuyor.</p></div></div>`;
      return;
    }

    // Select first known league automatically
    const firstKnown = allData.find(r => LEAGUE_NAMES[r.league_id]);
    if (firstKnown) selectLeague(firstKnown.league_id);
    else if (allData[0]) selectLeague(allData[0].league_id);

  } catch(err) {
    document.getElementById('standingsContent').innerHTML =
      `<div class="state-box"><div class="icon">❌</div><p>Veri yüklenemedi: ${err.message}</p></div>`;
    document.getElementById('leagueList').innerHTML =
      `<div class="state-box"><p>Hata</p></div>`;
  }
}

function leagueMeta(id) {
  return LEAGUE_NAMES[id] || { name: `Lig #${id}`, flag: '?', group: 'Diğer' };
}

function buildLeagueList(filter='') {
  const fl = filter.toLowerCase();
  const grouped = {};
  for (const row of allData) {
    const meta = leagueMeta(row.league_id);
    const name = meta.name;
    if (fl && !name.toLowerCase().includes(fl)) continue;
    const grp = meta.group || 'Diğer';
    if (!grouped[grp]) grouped[grp] = [];
    grouped[grp].push(row);
  }

  const orderGroups = [...GROUP_ORDER, 'Diğer'];
  const keys = [...orderGroups.filter(g => grouped[g]), ...Object.keys(grouped).filter(g => !orderGroups.includes(g))];

  let html = '';
  for (const grp of keys) {
    const rows = grouped[grp];
    if (!rows) continue;
    html += `<div class="lp-group-label">${grp}</div>`;
    for (const row of rows) {
      const meta = leagueMeta(row.league_id);
      const logo = getLeagueLogo(row);
      const isActive = row.league_id === activeId ? 'active' : '';
      const flagBadge = logo
        ? `<img class="lp-item-logo" src="${logo}" alt="" onerror="this.style.display='none'">`
        : meta.flag
          ? `<span class="lp-flag-badge">${meta.flag}</span>`
          : `<span class="lp-flag-badge">?</span>`;
      html += `
        <div class="lp-item ${isActive}" data-id="${row.league_id}" onclick="selectLeague(${row.league_id})">
          ${flagBadge}
          <span class="lp-item-name">${meta.name}</span>
        </div>`;
    }
  }
  document.getElementById('leagueList').innerHTML = html || `<div class="state-box"><p>Sonuç yok</p></div>`;
}

function getLeagueLogo(row) {
  if (!row.raw) return null;
  if (Array.isArray(row.raw)) return null;
  if (row.raw.response && row.raw.response[0] && row.raw.response[0].league) {
    return row.raw.response[0].league.logo || null;
  }
  return null;
}

function selectLeague(id) {
  activeId = id;
  // Update sidebar active state
  document.querySelectorAll('.lp-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });
  renderStandings(id);
}
window.selectLeague = selectLeague;

function parseStandings(row) {
  // Two formats: full API response or raw array
  if (!row.raw) return [];
  if (Array.isArray(row.raw)) {
    // Array of team standing objects (single group)
    return [row.raw];
  }
  if (row.raw.response && row.raw.response[0] && row.raw.response[0].league) {
    return row.raw.response[0].league.standings || [];
  }
  return [];
}

function renderStandings(id) {
  const row = allData.find(r => r.league_id === id);
  if (!row) {
    document.getElementById('standingsContent').innerHTML =
      `<div class="state-box"><div class="icon"></div><p>Veri bulunamadı.</p></div>`;
    return;
  }

  const meta = leagueMeta(id);
  const logo = getLeagueLogo(row);
  const groups = parseStandings(row);
  const updatedDate = row.updated_at ? new Date(row.updated_at).toLocaleDateString('tr-TR') : '';

  if (!groups || groups.length === 0) {
    document.getElementById('standingsContent').innerHTML =
      `<div class="standings-card"><div class="state-box"><div class="icon"></div><p>Bu lig için puan durumu verisi mevcut değil.</p></div></div>`;
    return;
  }

  let html = `<div class="standings-card">`;

  // Card header
  html += `<div class="card-header">`;
  if (logo) {
    html += `<img class="card-logo" src="${logo}" alt="${meta.name}" onerror="this.style.display='none'">`;
  } else {
    html += `<div class="card-logo-placeholder">${meta.flag}</div>`;
  }
  html += `
    <div>
      <div class="card-title">${meta.name}</div>
      <div class="card-subtitle">2024–25 Sezonu</div>
    </div>
    ${updatedDate ? `<div class="card-updated">Güncellendi: ${updatedDate}</div>` : ''}
  </div>`;

  // Render each group
  for (const group of groups) {
    if (!group || group.length === 0) continue;
    const groupName = group[0].group || '';

    if (groupName) {
      html += `<div class="card-group-label">${groupName}</div>`;
    }

    // Determine description zones for color coding
    const descriptions = group.map(t => (t.description || '').toLowerCase());

    html += `<table class="st-table">
      <thead>
        <tr>
          <th class="th-team" colspan="2">Takım</th>
          <th title="Oynadığı">O</th>
          <th title="Galibiyet" class="col-hid">G</th>
          <th title="Beraberlik" class="col-hid">B</th>
          <th title="Mağlubiyet" class="col-hid">M</th>
          <th title="Gol Farkı">AG</th>
          <th title="Puan"><strong>P</strong></th>
          <th title="Son 5 Maç" class="col-hid">Form</th>
        </tr>
      </thead>
      <tbody>`;

    for (const team of group) {
      const all = team.all || {};
      const desc = (team.description || '').toLowerCase();
      let rankClass = '';
      if (desc.includes('champions')) rankClass = 'rank-cl';
      else if (desc.includes('europa') || desc.includes('playoff') && desc.includes('ue')) rankClass = 'rank-uel';
      else if (desc.includes('conference') || desc.includes('konferans')) rankClass = 'rank-conf';
      else if (desc.includes('relegat') || desc.includes('düşme')) rankClass = 'rank-rel';
      else if (desc.includes('playoff')) rankClass = 'rank-playoff';

      const form = (team.form || '').split('').slice(-5);
      const formHtml = form.map(c => `<span class="form-pip form-${c}">${c}</span>`).join('');

      const teamLogo = team.team?.logo || '';

      html += `<tr>
        <td>
          <div class="td-rank-wrap">
            ${rankClass ? `<div class="rank-badge ${rankClass}"></div>` : ''}
            <span style="font-family:'Barlow',sans-serif;font-size:12px;color:var(--tx3);font-weight:600">${team.rank}</span>
          </div>
        </td>
        <td>
          <div class="td-team">
            ${teamLogo ? `<img class="td-team-logo" src="${teamLogo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="td-team-name">${team.team?.name || '—'}</span>
          </div>
        </td>
        <td>${all.played ?? '—'}</td>
        <td class="col-hid" style="color:var(--green)">${all.win ?? '—'}</td>
        <td class="col-hid">${all.draw ?? '—'}</td>
        <td class="col-hid" style="color:var(--live)">${all.lose ?? '—'}</td>
        <td style="${team.goalsDiff > 0 ? 'color:var(--green)' : team.goalsDiff < 0 ? 'color:var(--live)' : ''}">${team.goalsDiff != null ? (team.goalsDiff > 0 ? '+' : '') + team.goalsDiff : '—'}</td>
        <td class="td-pts">${team.points ?? '—'}</td>
        <td class="col-hid"><div class="td-form">${formHtml || '—'}</div></td>
      </tr>`;
    }

    html += `</tbody></table>`;
  }

  html += `</div>`;
  document.getElementById('standingsContent').innerHTML = html;

  // Scroll to top of content
  document.getElementById('standingsWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Search
document.getElementById('leagueSearch').addEventListener('input', function() {
  buildLeagueList(this.value);
});

// Init AdSense
try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(_) {}
try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(_) {}

// Start
load();

})();
</script>

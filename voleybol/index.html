<style>
/* ══════════════════════════════════════
   BASKETBOL — Modern Redesign
   Flashscore/Sofascore kalitesinde
══════════════════════════════════════ */

/* ── DATE STRIP ── */
.bb-date-wrap {
  background: var(--bg2);
  border-bottom: 1px solid var(--b1);
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: stretch;
}
#vball-date-strip {
  display: flex;
  gap: 2px;
  overflow-x: auto;
  padding: 8px 14px;
  scrollbar-width: none;
}
#vball-date-strip::-webkit-scrollbar { display: none; }
.bdp {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--tx3);
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all .15s;
  font-family: 'Barlow', sans-serif;
  letter-spacing: .2px;
}
.bdp:hover { color: var(--tx1); background: var(--b1); }
.bdp.active { background: var(--or); color: #fff; box-shadow: 0 2px 10px rgba(242,100,25,.35); }
.bb-cal-wrap {
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-left: 1px solid var(--b1);
}
.bb-cal-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 13px;
  border-radius: 18px;
  background: var(--b1);
  border: 1px solid var(--b2);
  color: var(--tx2);
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .2px;
  white-space: nowrap;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
}
.bb-cal-btn svg { flex-shrink: 0; }
.bb-cal-btn:hover {
  background: var(--or);
  border-color: var(--or);
  color: #fff;
  box-shadow: 0 2px 12px rgba(242,100,25,.35);
}
.bb-cal-input {
  position: absolute;
  right: 12px;
  bottom: 4px;
  width: 1px;
  height: 1px;
  margin: 0;
  padding: 0;
  border: 0;
  opacity: 0;
  pointer-events: none;
}

/* ── LEAGUE GROUP ── */
.bb-grp { border-bottom: 1px solid var(--b1); }
.bb-grp.closed .bb-body { display: none; }
.bb-grp.closed .bb-arrow { transform: rotate(-90deg); }

.bb-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 16px;
  background: var(--bg2);
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.bb-hdr:hover { background: var(--bg3); }
.bb-hdr-flag { font-size: 15px; flex-shrink: 0; line-height: 1; }
.bb-hdr-info { flex: 1; min-width: 0; }
.bb-hdr-name {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--tx1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bb-live-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  background: rgba(244,63,94,.1);
  border: 1px solid rgba(244,63,94,.2);
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  color: var(--live);
  letter-spacing: .4px;
  flex-shrink: 0;
}
.bb-live-dot { width: 5px; height: 5px; background: var(--live); border-radius: 50%; animation: bb-blink 1.2s infinite; }
@keyframes bb-blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.bb-arrow { color: var(--tx3); font-size: 11px; flex-shrink: 0; transition: transform .2s; }

/* ── MATCH ROW ── */
.bb-mr {
  display: grid;
  grid-template-columns: 75px 1fr auto 1fr 16px;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  height: 54px;
  border-top: 1px solid var(--b1);
  text-decoration: none;
  position: relative;
  transition: background .1s;
}
.bb-mr::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 0 2px 2px 0;
  opacity: 0;
  transition: opacity .15s;
}
.bb-mr:hover { background: var(--bg3); }
.bb-mr.live { background: rgba(244,63,94,.03); }
.bb-mr.live::before { background: var(--live); opacity: 1; box-shadow: 1px 0 8px rgba(244,63,94,.4); }
.bb-mr.done::before { background: var(--b3); opacity: 1; }

/* Status */
.bb-st { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 2px; }
.bb-st-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
}
.bb-mr.live  .bb-st-lbl { color: var(--live); }
.bb-mr.done  .bb-st-lbl { color: var(--tx3); font-weight: 600; font-size: 12px; }
.bb-mr.sched .bb-st-lbl { color: var(--tx2); }
.bb-st-clk { font-size: 10px; color: var(--live); font-family: 'JetBrains Mono', monospace; opacity: .8; }

/* Teams */
.bb-team { display: flex; align-items: center; gap: 6px; min-width: 0; }
.bb-home { justify-content: flex-end; }
.bb-away { justify-content: flex-start; }
.bb-home .bb-logo-wrap { order: 2; }

.bb-logo-wrap { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.bb-logo { width: 22px; height: 22px; object-fit: contain; border-radius: 3px; }
.bb-logo-ph { font-size: 14px; line-height: 1; }

.bb-tname {
  font-size: 13px;
  font-weight: 500;
  color: var(--tx1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
}
.bb-home .bb-tname { text-align: right; }
.bb-tname.w { font-weight: 700; color: var(--tx1); }
.bb-tname.l { color: var(--tx3); font-weight: 400; }

/* Score */
.bb-scores { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bb-total {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--b1);
  border-radius: 7px;
  border: 1px solid var(--b2);
  overflow: hidden;
  min-width: 70px;
}
.bb-sn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--tx1);
  min-width: 28px;
  text-align: center;
  padding: 5px 8px;
  line-height: 1;
}
.bb-sn.w { color: var(--tx1); font-weight: 800; }
.bb-sn.l { color: var(--tx3); }
.bb-sdiv { width: 1px; height: 16px; background: var(--b2); flex-shrink: 0; }
.bb-vs { font-size: 11px; color: var(--tx3); padding: 5px 14px; font-family: 'Barlow', sans-serif; letter-spacing: .5px; font-weight: 600; }
.bb-mr.live .bb-total { border-color: rgba(244,63,94,.25); background: rgba(244,63,94,.04); }
.bb-mr.live .bb-sn { color: var(--live); }

/* Quarters */
.bb-qtrs { display: flex; gap: 4px; }
.bb-qchip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  min-width: 20px;
  padding: 1px 2px;
  border-radius: 3px;
}
.bb-ql { font-size: 8px; font-weight: 700; color: var(--tx3); font-family: 'Barlow Condensed', sans-serif; line-height: 1; letter-spacing: .2px; }
.bb-qs { font-size: 9.5px; color: var(--tx3); font-family: 'JetBrains Mono', monospace; line-height: 1; }
.bb-qchip.act { background: rgba(244,63,94,.08); }
.bb-qchip.act .bb-ql, .bb-qchip.act .bb-qs { color: var(--live); }

.bb-arr { color: var(--b3); font-size: 13px; text-align: center; transition: color .1s, transform .1s; }
.bb-mr:hover .bb-arr { color: var(--tx3); transform: translateX(2px); }

/* ── STATES ── */
.bb-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 64px 20px; color: var(--tx3); font-size: 14px; text-align: center;
}
.bb-empty-icon { font-size: 38px; opacity: .45; }

.bb-skel { padding: 8px 0; }
.bb-skel-h {
  height: 36px; margin: 10px 16px 2px;
  background: linear-gradient(90deg, var(--b1) 25%, var(--b2) 50%, var(--b1) 75%);
  background-size: 200% 100%;
  border-radius: 4px;
  animation: bb-shim 1.4s infinite;
}
.bb-skel-r {
  height: 54px; margin: 0 0 1px;
  background: linear-gradient(90deg, var(--b1) 25%, var(--b2) 50%, var(--b1) 75%);
  background-size: 200% 100%;
  border-top: 1px solid var(--b1);
  animation: bb-shim 1.4s infinite;
}
.bb-skel-r:nth-child(2){animation-delay:.08s}
.bb-skel-r:nth-child(3){animation-delay:.16s}
.bb-skel-r:nth-child(4){animation-delay:.24s}
.bb-skel-r:nth-child(6){animation-delay:.12s}
.bb-skel-r:nth-child(7){animation-delay:.2s}
@keyframes bb-shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── TOPBAR ── */
#vball-tb-live {
  display: none;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: rgba(244,63,94,.1);
  border: 1px solid rgba(244,63,94,.2);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  color: var(--live);
  letter-spacing: .3px;
}
.bb-tb-dot { width: 5px; height: 5px; background: var(--live); border-radius: 50%; animation: bb-blink 1.2s infinite; }

.sb-sport-badge {
  font-size: 9px; font-weight: 800; background: var(--or);
  color: #fff; padding: 2px 5px; border-radius: 4px; margin-left: auto; letter-spacing: .4px;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .bb-mr { grid-template-columns: 70px 1fr auto 1fr 14px; gap: 5px; padding: 0 12px; height: 50px; }
  .bb-sn { font-size: 14px; min-width: 22px; padding: 5px 6px; }
  .bb-tname { font-size: 12px; }
  .bb-qtrs { display: none; }
  .bb-total { min-width: 60px; }
  .bb-cal-label { display: none; }
}
@media (max-width: 380px) {
  .bb-logo-wrap { display: none; }
}
</style>
</head>

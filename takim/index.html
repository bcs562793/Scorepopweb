<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Takım Detayı — ScorePop</title>
  <link rel="stylesheet" href="/style.css?v=9">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Her zaman görünen geri butonu — .tb-left mobilde açılıyor, bu her genişlikte açık kalsın */
    .tb-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;
      margin-right:10px;border-radius:6px;color:var(--tx2);transition:all .15s;flex-shrink:0;}
    .tb-back:hover{background:var(--b1);color:var(--tx1);}
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="sb-top">
    <a class="sb-brand" href="/" style="text-decoration:none;cursor:pointer;">
      <div class="sb-mark"><img src="/logo.png" alt="ScorePop Logo"></div>
      <div class="sb-name">SCORE<em>POP</em></div>
    </a>
  </div>

  <nav class="sb-nav">
    <a class="sb-btn" href="/" style="text-decoration:none;">
      <svg class="sb-sport-ic" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 4.2 9.4 6l-.9 2.8H5.5L4.6 6 7 4.2z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/><path d="M7 1.2v3M12.7 5.6 9.4 6M11 11.5 8.5 8.8M3 11.5l2.5-2.7M1.3 5.6 4.6 6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg><span>Futbol</span>
    </a>
    <a class="sb-btn" href="/basketbol/" style="text-decoration:none;">
      <svg class="sb-sport-ic" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 1v12M1 7h12M2.8 2.8c2 1.6 2 6.8 0 8.4M11.2 2.8c-2 1.6-2 6.8 0 8.4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg><span>Basketbol</span>
    </a>
    <a class="sb-btn" href="/voleybol/" style="text-decoration:none;">
      <svg class="sb-sport-ic" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 1c2.8 2 3.9 5.4 2.9 8.8M7 1C4.6 3.2 2.1 4 1.2 7.6M12.8 7.8c-3.2 1.6-7.6 1-9.9-1.6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg><span>Voleybol</span>
    </a>
  </nav>

  <div class="sb-sep"></div>

  <nav class="sb-nav" style="padding-top:4px;padding-bottom:4px;">
    <a class="sb-btn" href="/tahmin/" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.2c-2.4 0-4.3 1.8-4.3 4 0 1.3.6 2.4 1.6 3.2v1.4c0 .4.3.7.7.7h4c.4 0 .7-.3.7-.7V8.4c1-.8 1.6-1.9 1.6-3.2 0-2.2-1.9-4-4.3-4z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/><path d="M5 11.8h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>ScorePop AI Tahmin</span>
      <span class="sb-sport-badge">AI</span>
    </a>
    <a class="sb-btn" href="/pop-sosyal/" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h8A1.5 1.5 0 0 1 12 2.5v5A1.5 1.5 0 0 1 10.5 9H5.8L3 11.3V9H2.5A1.5 1.5 0 0 1 1 7.5v-5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      <span>Pop Sosyal</span>
      <span class="sb-sport-badge">YENİ</span>
    </a>
    <a class="sb-btn" href="/haberler" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x=".75" y=".75" width="11.5" height="11.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3 4h7M3 6.5h7M3 9h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Haberler</span>
    </a>
    <a class="sb-btn" href="/tv-rehberi/" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x=".75" y="1.75" width="11.5" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 10.25v1.5M9 10.25v1.5M2.5 11.75h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="6.5" cy="5.75" r="1.5" stroke="currentColor" stroke-width="1.1"/></svg>
      <span>TV Rehberi</span>
    </a>
    <a class="sb-btn" href="/puan-durumu/" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x=".75" y="3.75" width="2.5" height="8.5" rx="1" fill="currentColor" opacity=".7"/><rect x="5.25" y="1.75" width="2.5" height="10.5" rx="1" fill="currentColor"/><rect x="9.75" y="5.75" width="2.5" height="6.5" rx="1" fill="currentColor" opacity=".5"/></svg>
      <span>Puan Durumu</span>
    </a>
    <a class="sb-btn" href="/transferler/" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 4.5h8.5M7 2l2.5 2.5L7 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 8.5H3.5M6 11l-2.5-2.5L6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Transferler</span>
    </a>
    <a class="sb-btn" href="/wc-2026" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5a5 5 0 1 0 0 10 5 5 0 0 0 0-10z" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 6.5h10M6.5 1.5c-1.5 1.5-2 3-2 5s.5 3.5 2 5M6.5 1.5c1.5 1.5 2 3 2 5s-.5 3.5-2 5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
      <span>2026 Dünya Kupası</span>
    </a>
    <a class="sb-btn" href="/hakkimizda" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="4.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M2 11c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Hakkımızda</span>
    </a>
    <a class="sb-btn" href="/iletisim" style="text-decoration:none;">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x=".75" y="2.75" width="11.5" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 3.5l5.5 4 5.5-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>İletişim</span>
    </a>
  </nav>

  <div class="sb-bottom"></div>
</aside>

<main id="main">
  <header id="topbar">
    <button class="tb-back" onclick="window.history.length>1?window.history.back():window.location.href='/'" aria-label="Geri">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="tb-left">
      <button class="tb-menu" onclick="toggleSidebar()">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M0 1h16M0 6h16M0 11h16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="tb-mob-brand">Takım</span>
    </div>
    <div style="flex:1"></div>
  </header>

  <div class="main-content" id="team-root" style="padding:16px 16px 32px;max-width:920px;margin:0 auto;">
    <div class="skel" style="padding:20px;"><div class="sk-h"></div><div class="sk-r"></div><div class="sk-r"></div></div>
  </div>
</main>

<div id="overlay" onclick="toggleSidebar()"></div>

<script>
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
</script>

<script src="/config.js"></script>
<script src="/takim/teams.js?v=5"></script>
</body>
</html>

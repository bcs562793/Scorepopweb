<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Haber Detayı — ScorePop</title>
  <meta name="robots" content="index,follow"/>
  <link rel="canonical" href="https://scorepop.com.tr/haber"/>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JS4J2RCJJ9"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JS4J2RCJJ9');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0b0d11;--bg2:#0f1218;--bg3:#141921;--bg4:#1a2030;--b1:rgba(255,255,255,.05);--b2:rgba(255,255,255,.08);--b3:rgba(255,255,255,.12);--tx1:#dde4ef;--tx2:#8899b0;--tx3:#4a5a70;--or:#f26419;--or2:rgba(242,100,25,.15);--or-glow:rgba(242,100,25,.35)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--tx1);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:16px;padding:0 24px;height:52px}
    .topbar-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--tx1)}
    .topbar-mark{width:30px;height:30px;background:var(--or);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px var(--or-glow);overflow:hidden;flex-shrink:0}
    .topbar-mark img{width:30px;height:30px;object-fit:cover}
    .topbar-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.5px}
    .topbar-title em{color:var(--or);font-style:normal}
    .topbar-back{margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--tx2);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;border:1px solid var(--b2);transition:all .2s}
    .topbar-back:hover{color:var(--tx1);border-color:var(--b3);background:var(--bg3)}
    .page-wrap{max-width:800px;margin:0 auto;padding:32px 20px 60px}
    .haber-header{margin-bottom:24px}
    .haber-kategori{display:inline-block;background:var(--or2);color:var(--or);border:1px solid var(--or);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:12px}
    .haber-baslik{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1.2;margin-bottom:16px}
    .haber-meta{color:var(--tx3);font-size:13px;margin-bottom:20px}
    .haber-kapak{width:100%;max-height:400px;object-fit:cover;border-radius:12px;margin-bottom:24px;background:var(--bg3)}
    .haber-icerik{color:var(--tx1);font-size:16px;line-height:1.8}
    .haber-icerik p{margin-bottom:16px}
    .haber-icerik a{color:var(--or);text-decoration:none}
    .haber-icerik a:hover{text-decoration:underline}
    .haber-icerik img{max-width:100%;height:auto;border-radius:8px;margin:16px 0}
    .haber-kaynak{display:block;margin-top:32px;padding:16px;background:var(--bg2);border:1px solid var(--b1);border-radius:8px;text-align:center}
    .haber-kaynak a{color:var(--or);font-weight:600;text-decoration:none}
    .haber-kaynak a:hover{text-decoration:underline}
    .loading{text-align:center;padding:60px 20px;color:var(--tx2)}
    .skeleton{background:var(--bg3);border-radius:8px;animation:pulse 1.4s ease-in-out infinite;margin-bottom:16px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .sk-title{height:32px;width:80%}
    .sk-meta{height:16px;width:40%}
    .sk-image{height:300px;width:100%}
    .sk-text{height:14px;width:100%}
    .sk-text-short{height:14px;width:75%}
    .error-box{text-align:center;padding:60px 20px;color:var(--tx2);background:var(--bg2);border:1px solid var(--b1);border-radius:12px}
    .error-icon{font-size:48px;margin-bottom:16px}
    footer{text-align:center;padding:32px 20px;color:var(--tx3);font-size:13px;border-top:1px solid var(--b1);margin-top:60px}
    footer a{color:var(--tx2);text-decoration:none}
    footer a:hover{color:var(--or)}
  </style>
</head>
<body>
<nav class="topbar">
  <a class="topbar-brand" href="/">
    <div class="topbar-mark"><img src="https://i.hizliresim.com/gbleupf.png" alt="ScorePop Logo"/></div>
    <div class="topbar-title">SCORE<em>POP</em></div>
  </a>
  <a class="topbar-back" href="/haberler">← Haberler</a>
</nav>

<div id="content" class="page-wrap">
  <div class="loading" id="loading">
    <div class="skeleton sk-title"></div>
    <div class="skeleton sk-meta"></div>
    <div class="skeleton sk-image"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-text-short"></div>
  </div>
</div>

<footer>
  <p>&copy; 2026 ScorePop — <a href="/">Ana Sayfa</a> · <a href="/haberler">Haberler</a> · <a href="/hakkimizda">Hakkımızda</a> · <a href="/iletisim">İletişim</a></p>
</footer>

<script>
(function() {
  'use strict';

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(str) {
    var d, months, result;
    try {
      d = new Date(str);
      months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
      result = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear() + ', ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      return result;
    } catch(e) {
      return '';
    }
  }

  function showError(msg) {
    var content = document.getElementById('content');
    if (content) {
      content.innerHTML = '<div class="error-box"><div class="error-icon">⚠️</div><p>' + escHtml(msg) + '</p><p style="margin-top:12px"><a href="/haberler" style="color:var(--or)">← Haberlere dön</a></p></div>';
    }
  }

  function getSlugFromUrl() {
    var path = window.location.pathname;
    var match = path.match(/^\/haber\/([^/]+)\/?$/);
    return match ? match[1] : null;
  }

  function renderHaber(h) {
    var content, html, kat, tarih, kapak;
    content = document.getElementById('content');
    if (!content) return;

    kat = escHtml(h.kategori || 'Genel');
    tarih = fmtDate(h.yayin_tarihi);
    kapak = h.kapak_url ? '<img class="haber-kapak" src="' + escHtml(h.kapak_url) + '" alt="' + escHtml(h.baslik) + '"/>' : '';

    html = '<article>' +
      '<header class="haber-header">' +
        '<span class="haber-kategori">' + kat + '</span>' +
        '<h1 class="haber-baslik">' + escHtml(h.baslik) + '</h1>' +
        '<div class="haber-meta">' + tarih + '</div>' +
      '</header>' +
      kapak +
      '<div class="haber-icerik">' +
        '<p>' + escHtml(h.ozet || '') + '</p>' +
        (h.icerik ? '<p>' + escHtml(h.icerik) + '</p>' : '') +
      '</div>' +
      (h.kaynak_url ? '<a class="haber-kaynak" href="' + escHtml(h.kaynak_url) + '" target="_blank" rel="noopener noreferrer">Kaynağa Git →</a>' : '') +
    '</article>';

    content.innerHTML = html;
    document.title = escHtml(h.baslik) + ' — ScorePop';
  }

  function loadHaber() {
    var slug = getSlugFromUrl();
    var content = document.getElementById('content');

    if (!slug) {
      showError('Haber bulunamadı.');
      return;
    }

    fetch('/api/haberler?slug=' + encodeURIComponent(slug))
      .then(function(response) {
        if (!response.ok) throw new Error('API hatası: ' + response.status);
        return response.json();
      })
      .then(function(data) {
        if (data && data.length > 0) {
          renderHaber(data[0]);
        } else {
          showError('Haber bulunamadı.');
        }
      })
      .catch(function(e) {
        showError('Haber yüklenemedi: ' + e.message);
      });
  }

  loadHaber();
})();
</script>
</body>
</html>

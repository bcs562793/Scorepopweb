<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Transferler — ScorePop | Resmi Transferler ve Söylenti Kulisi</title>
  <meta name="description" content="Premier Lig, La Liga, Bundesliga, Serie A, Ligue 1 ve Süper Lig'de güncel resmi transferler ve transfer söylentileri. Bonservis bedelleri, kiralıklar ve transfer olasılıkları ScorePop'ta."/>
  <meta name="robots" content="index,follow"/>
  <link rel="canonical" href="https://scorepop.com.tr/transferler"/>
  <meta property="og:title" content="Transferler — ScorePop"/>
  <meta property="og:description" content="Güncel resmi transferler ve transfer söylentileri — bonservis bedelleri, kiralıklar ve transfer olasılıkları."/>
  <meta property="og:url" content="https://scorepop.com.tr/transferler"/>
  <meta property="og:type" content="website"/>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JS4J2RCJJ9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JS4J2RCJJ9');
  </script>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6664942674336301" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>

  <!-- Cloudflare Workers ile uyumsuz spekülatif prefetch/prerender devre dışı -->
  <meta name="supports-loading-mode" content="credentialed-prerender">
  <script type="speculationrules">{"prefetch":[],"prerender":[]}</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="/config.js?v=0"></script>

  <style>
    :root {
      --sb-w: 240px;
      --bg:   #f5f5f5; --bg2: #ffffff; --bg3: #ffffff; --bg4: #eef0f3; --bg5: #e2e6ec;
      --b1:   rgba(0,0,0,.08); --b2: rgba(0,0,0,.12); --b3: rgba(0,0,0,.16);
      --tx1:  #1a1d23; --tx2: #5b6675; --tx3: #8b95a4;
      --or:   #f26419; --or2: rgba(242,100,25,.15); --or3: rgba(242,100,25,.08);
      --or-glow: rgba(242,100,25,.35);
      --live: #f43f5e; --live2: rgba(244,63,94,.12); --live-gl: rgba(244,63,94,.4);
      --green: #10b981; --blue: #3b82f6; --yellow: #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--tx1);
      font-family: 'Barlow', sans-serif; font-size: 14px;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    img { display: block; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--b3); border-radius: 3px; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2); border-bottom: 1px solid var(--b1);
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px; height: 52px;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--tx1); flex-shrink: 0;
    }
    .topbar-mark {
      width: 30px; height: 30px; background: var(--or);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; box-shadow: 0 0 14px var(--or-glow);
      overflow: hidden; flex-shrink: 0;
    }
    .topbar-mark img { width: 100%; height: 100%; object-fit: contain; }
    .topbar-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .topbar-name em { color: var(--or); font-style: normal; }
    .topbar-sep { width: 1px; height: 20px; background: var(--b2); flex-shrink: 0; }
    .topbar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 1px;
      color: var(--tx2); text-transform: uppercase;
    }
    .topbar-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .topbar-link {
      padding: 6px 12px; border-radius: 6px;
      font-size: 13px; font-weight: 500; color: var(--tx2);
      transition: all .15s;
    }
    .topbar-link:hover { background: var(--b1); color: var(--tx1); }
    .topbar-link.active { background: var(--or2); color: var(--or); }

    /* ── LAYOUT ── */
    .page-wrap {
      display: flex; flex: 1;
      max-width: 1200px; width: 100%;
      margin: 0 auto; padding: 24px 16px;
      gap: 20px; align-items: flex-start;
    }

    /* ── LEFT: LEAGUE PICKER ── */
    .league-panel {
      width: 220px; flex-shrink: 0;
      background: var(--bg2); border: 1px solid var(--b1);
      border-radius: 12px; overflow: hidden;
      position: sticky; top: 72px; max-height: calc(100vh - 90px);
      display: flex; flex-direction: column;
    }
    .lp-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--b1); }
    .lp-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--tx3); margin-bottom: 8px;
    }
    .lp-search {
      width: 100%; padding: 7px 10px;
      background: var(--bg3); border: 1px solid var(--b1);
      border-radius: 7px; color: var(--tx1);
      font-family: 'Barlow', sans-serif; font-size: 12px;
      outline: none; transition: border-color .15s;
    }
    .lp-search:focus { border-color: var(--or); }
    .lp-search::placeholder { color: var(--tx3); }
    .lp-scroll { overflow-y: auto; flex: 1; padding: 6px; scrollbar-width: thin; }
    .lp-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 7px;
      cursor: pointer; transition: all .12s;
      white-space: nowrap; overflow: hidden;
    }
    .lp-item:hover { background: var(--b1); }
    .lp-item.active { background: var(--or2); }
    .lp-item.active .lp-item-name { color: var(--or); }
    .lp-flag-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 700;
      color: var(--tx3); background: var(--bg4);
      border-radius: 4px; padding: 1px 4px;
      flex-shrink: 0; letter-spacing: .5px;
    }
    .lp-item-name {
      font-size: 12px; font-weight: 500; color: var(--tx2);
      overflow: hidden; text-overflow: ellipsis; flex: 1;
      transition: color .12s;
    }
    .lp-item-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--tx3); flex-shrink: 0;
    }

    /* ── RIGHT: CONTENT ── */
    .transfers-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }

    .ad-slot {
      background: var(--bg2); border: 1px solid var(--b1);
      border-radius: 12px; padding: 12px; text-align: center;
      min-height: 90px; display: flex; align-items: center;
      justify-content: center; overflow: hidden;
    }

    /* tabs */
    .tf-tabs {
      display: flex; gap: 6px; background: var(--bg2);
      border: 1px solid var(--b1); border-radius: 12px; padding: 5px;
    }
    .tf-tab {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 7px; padding: 10px 12px; border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
      font-weight: 700; letter-spacing: .5px; color: var(--tx2);
      transition: all .15s;
    }
    .tf-tab:hover { background: var(--b1); }
    .tf-tab.active { background: var(--or); color: #fff; }
    .tf-tab-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      font-weight: 600; opacity: .75;
    }

    /* search + meta bar */
    .tf-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg2); border: 1px solid var(--b1);
      border-radius: 12px; padding: 10px 12px;
    }
    .tf-search {
      flex: 1; padding: 8px 12px;
      background: var(--bg3); border: 1px solid var(--b1);
      border-radius: 8px; color: var(--tx1);
      font-family: 'Barlow', sans-serif; font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    .tf-search:focus { border-color: var(--or); }
    .tf-search::placeholder { color: var(--tx3); }
    .tf-updated {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--tx3); white-space: nowrap; flex-shrink: 0;
    }

    /* list card */
    .tf-card {
      background: var(--bg2); border: 1px solid var(--b1);
      border-radius: 12px; overflow: hidden;
    }

    /* row */
    .tf-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px; border-bottom: 1px solid var(--b1);
      transition: background .1s;
    }
    .tf-row:last-child { border-bottom: none; }
    .tf-row:hover { background: var(--b1); }

    .tf-league-chip {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
      color: var(--tx3); background: var(--bg4); border-radius: 4px;
      padding: 2px 5px; flex-shrink: 0; letter-spacing: .5px; width: 30px;
      text-align: center;
    }

    .tf-player { min-width: 0; flex: 1.3; }
    .tf-pname {
      font-family: 'Barlow', sans-serif; font-size: 13.5px; font-weight: 600;
      color: var(--tx1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tf-pmeta { font-size: 11px; color: var(--tx3); margin-top: 2px; }
    .tf-pname a:hover { color: var(--or); }

    .tf-clubs {
      display: flex; align-items: center; gap: 8px; flex: 1.6; min-width: 0;
    }
    .tf-club { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
    .tf-club-crest { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
    .tf-club-crest-ph {
      width: 18px; height: 18px; border-radius: 4px; background: var(--bg4);
      flex-shrink: 0;
    }
    .tf-club-name {
      font-size: 12px; color: var(--tx2); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .tf-club-name a:hover { color: var(--or); }
    .tf-arrow { flex-shrink: 0; color: var(--tx3); }

    .tf-right { flex: 1; text-align: right; flex-shrink: 0; min-width: 92px; }
    .tf-fee-amt {
      font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
      color: var(--tx1);
    }
    .tf-fee-sub { font-size: 10px; color: var(--tx3); margin-top: 2px; }
    .tf-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px; letter-spacing: .3px;
    }
    .badge-loan   { background: rgba(59,130,246,.12); color: var(--blue); }
    .badge-free   { background: rgba(16,185,129,.12); color: var(--green); }
    .badge-unknown{ background: var(--bg4); color: var(--tx3); }

    .prob-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
      padding: 3px 8px; border-radius: 6px; display: inline-block;
    }
    .prob-high { background: rgba(16,185,129,.14); color: var(--green); }
    .prob-mid  { background: var(--or2); color: var(--or); }
    .prob-low  { background: var(--bg4); color: var(--tx3); }
    .tf-date { font-size: 10px; color: var(--tx3); margin-top: 3px; }

    /* loading & empty */
    .state-box {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 12px;
      color: var(--tx3);
    }
    .state-box .icon { font-size: 32px; opacity: .4; }
    .state-box p { font-size: 14px; }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid var(--b2); border-top-color: var(--or);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* responsive */
    @media (max-width: 768px) {
      .page-wrap { flex-direction: column; padding: 12px; }
      .league-panel { width: 100%; position: static; max-height: none; }
      .lp-scroll { max-height: 160px; }
      .tf-row { flex-wrap: wrap; }
      .tf-clubs { order: 3; flex-basis: 100%; padding-top: 6px; border-top: 1px dashed var(--b1); margin-top: 4px; }
      .tf-right { text-align: right; }
    }
    @media (max-width: 480px) {
      .topbar-sep, .topbar-title { display: none; }
      .topbar-nav { gap: 2px; }
      .topbar-link { padding: 5px 8px; font-size: 12px; }
      .tf-bar { flex-wrap: wrap; }
      .tf-updated { order: -1; flex-basis: 100%; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <a class="topbar-brand" href="/">
    <div class="topbar-mark"><img src="/logo.png" alt="ScorePop Logo"></div>
    <span class="topbar-name">SCORE<em>POP</em></span>
  </a>
  <div class="topbar-sep"></div>
  <span class="topbar-title">Transferler</span>
  <nav class="topbar-nav">
    <a class="topbar-link" href="/canli">Canlı</a>
    <a class="topbar-link" href="/bugun">Bugün</a>
    <a class="topbar-link" href="/puan-durumu/">Puan Durumu</a>
    <a class="topbar-link active" href="/transferler/">Transferler</a>
    <a class="topbar-link" href="/hakkimizda">Hakkımızda</a>
  </nav>
</header>

<div class="page-wrap">

  <aside class="league-panel">
    <div class="lp-header">
      <div class="lp-title">Ligler</div>
      <input class="lp-search" type="text" id="leagueSearch" placeholder="Lig ara…" autocomplete="off"/>
    </div>
    <div class="lp-scroll" id="leagueList">
      <div class="state-box"><div class="spinner"></div></div>
    </div>
  </aside>

  <main class="transfers-wrap" id="transfersWrap">

    <div class="tf-tabs">
      <button class="tf-tab active" id="tabOfficial" onclick="selectTab('official')">
        Resmi Transferler <span class="tf-tab-count" id="countOfficial"></span>
      </button>
      <button class="tf-tab" id="tabRumour" onclick="selectTab('rumour')">
        Söylenti Kulisi <span class="tf-tab-count" id="countRumour"></span>
      </button>
    </div>

    <div class="tf-bar">
      <input class="tf-search" type="text" id="playerSearch" placeholder="Oyuncu veya kulüp ara…" autocomplete="off"/>
      <div class="tf-updated" id="updatedAt"></div>
    </div>

    <div class="ad-slot">
      <ins class="adsbygoogle"
           style="display:block;width:100%;min-height:90px;"
           data-ad-client="ca-pub-6664942674336301"
           data-ad-slot="auto"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
    </div>

    <div id="listContent">
      <div class="tf-card"><div class="state-box"><div class="spinner"></div><p>Yükleniyor…</p></div></div>
    </div>

  </main>
</div>

<script>
(function(){
'use strict';

/* ── LİG TANIMLARI (TM lig kodları) ── */
const LEAGUES = [
  { id: 'TR1', name: 'Süper Lig',      flag: 'TR' },
  { id: 'GB1', name: 'Premier Lig',    flag: 'GB' },
  { id: 'ES1', name: 'La Liga',        flag: 'ES' },
  { id: 'IT1', name: 'Serie A',        flag: 'IT' },
  { id: 'L1',  name: 'Bundesliga',     flag: 'DE' },
  { id: 'FR1', name: 'Ligue 1',        flag: 'FR' },
];
const LEAGUE_MAP = {}; LEAGUES.forEach(l => LEAGUE_MAP[l.id] = l);

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(v){ return (v!=null) ? '€'+Number(v).toLocaleString('tr-TR') : null; }
function teamSlug(name){
  return String(name||'').toLowerCase().replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}
const playerSlug = teamSlug;
function playerCell(r){
  const nameInner = esc(r.player_name || '—');
  const meta = playerMeta(r);
  const name = (r.player_id != null)
    ? `<a href="/oyuncu/${r.player_id}-${playerSlug(r.player_name)}">${nameInner}</a>`
    : nameInner;
  return `<div class="tf-player">
    <div class="tf-pname">${name}</div>
    ${meta ? `<div class="tf-pmeta">${esc(meta)}</div>` : ''}
  </div>`;
}
function playerMeta(r){
  const parts = [];
  if (r.player_position) parts.push(r.player_position);
  if (r.player_age) parts.push(r.player_age + ' yaş');
  if (r.nationality) parts.push(r.nationality);
  return parts.join(' · ');
}

/* ── SUPABASE INIT ── */
let supabase;
try {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  document.getElementById('listContent').innerHTML =
    `<div class="tf-card"><div class="state-box"><div class="icon">⚠️</div><p>Bağlantı hatası: config.js bulunamadı.</p></div></div>`;
}

let transfers = [];
let rumours = [];
let teamMap = {};        // id -> {name, crest_url, mac_t_id}
let activeTab = 'official';
let activeLeague = 'all';
let searchQ = '';
let lastUpdated = null;

async function load() {
  if (!supabase) return;
  try {
    const [tRes, rRes] = await Promise.all([
      supabase.from('tm_transfers')
        .select('player_id,player_name,player_age,player_position,nationality,from_club_id,to_club_id,market_value_eur,fee_eur,fee_type,league_id,scraped_at')
        .order('scraped_at', { ascending: false, nullsFirst: false })
        .limit(2000),
      supabase.from('tm_rumours')
        .select('player_id,player_name,player_age,player_position,nationality,current_club_id,interested_club_id,probability,source_date,league_id,last_seen_at')
        .eq('is_active', true)
        .order('probability', { ascending: false, nullsFirst: false })
        .limit(2000),
    ]);
    if (tRes.error) throw tRes.error;
    if (rRes.error) throw rRes.error;
    transfers = tRes.data || [];
    rumours = rRes.data || [];

    // en güncel zaman damgası
    const tMax = transfers.reduce((m,r)=> r.scraped_at > m ? r.scraped_at : m, '');
    const rMax = rumours.reduce((m,r)=> r.last_seen_at > m ? r.last_seen_at : m, '');
    lastUpdated = [tMax, rMax].filter(Boolean).sort().pop() || null;

    // takım id'lerini topla, tek seferde çek
    const ids = new Set();
    transfers.forEach(r => { if(r.from_club_id) ids.add(r.from_club_id); if(r.to_club_id) ids.add(r.to_club_id); });
    rumours.forEach(r => { if(r.current_club_id) ids.add(r.current_club_id); if(r.interested_club_id) ids.add(r.interested_club_id); });

    const idArr = [...ids];
    for (let i = 0; i < idArr.length; i += 300) {
      const chunk = idArr.slice(i, i + 300);
      const { data } = await supabase.from('tm_teams').select('id,name,crest_url,mac_t_id').in('id', chunk);
      (data||[]).forEach(t => teamMap[t.id] = t);
    }

    buildLeagueList();
    updateCounts();
    renderUpdated();
    render();
  } catch(err) {
    document.getElementById('listContent').innerHTML =
      `<div class="tf-card"><div class="state-box"><div class="icon">❌</div><p>Veri yüklenemedi: ${esc(err.message)}</p></div></div>`;
  }
}

function renderUpdated(){
  if (!lastUpdated) return;
  const d = new Date(lastUpdated);
  document.getElementById('updatedAt').textContent = 'Güncellendi: ' + d.toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function updateCounts(){
  document.getElementById('countOfficial').textContent = '(' + transfers.length + ')';
  document.getElementById('countRumour').textContent = '(' + rumours.length + ')';
}

/* ── LİG PANELİ ── */
function buildLeagueList(filter=''){
  const fl = filter.toLowerCase();
  let html = '';
  const allCount = activeTab === 'official' ? transfers.length : rumours.length;
  if (!fl || 'tümü'.includes(fl) || 'tumu'.includes(fl)) {
    html += `<div class="lp-item ${activeLeague==='all'?'active':''}" data-id="all" onclick="selectLeague('all')">
      <span class="lp-flag-badge">★</span>
      <span class="lp-item-name">Tümü</span>
      <span class="lp-item-count">${allCount}</span>
    </div>`;
  }
  for (const lg of LEAGUES) {
    if (fl && !lg.name.toLowerCase().includes(fl)) continue;
    const rows = activeTab === 'official' ? transfers : rumours;
    const n = rows.filter(r => r.league_id === lg.id).length;
    const isActive = activeLeague === lg.id ? 'active' : '';
    html += `<div class="lp-item ${isActive}" data-id="${lg.id}" onclick="selectLeague('${lg.id}')">
      <span class="lp-flag-badge">${lg.flag}</span>
      <span class="lp-item-name">${esc(lg.name)}</span>
      <span class="lp-item-count">${n}</span>
    </div>`;
  }
  document.getElementById('leagueList').innerHTML = html || `<div class="state-box"><p>Sonuç yok</p></div>`;
}

function selectLeague(id){
  activeLeague = id;
  document.querySelectorAll('.lp-item').forEach(el => el.classList.toggle('active', el.dataset.id === String(id)));
  render();
}
window.selectLeague = selectLeague;

function selectTab(tab){
  activeTab = tab;
  document.getElementById('tabOfficial').classList.toggle('active', tab === 'official');
  document.getElementById('tabRumour').classList.toggle('active', tab === 'rumour');
  buildLeagueList(document.getElementById('leagueSearch').value);
  render();
}
window.selectTab = selectTab;

/* ── KULÜP HÜCRESİ ── */
function clubCell(clubId){
  const t = teamMap[clubId];
  if (!t) {
    return `<div class="tf-club"><div class="tf-club-crest-ph"></div><span class="tf-club-name">—</span></div>`;
  }
  const crest = t.crest_url
    ? `<img class="tf-club-crest" src="${t.crest_url}" alt="" onerror="this.style.display='none'">`
    : `<div class="tf-club-crest-ph"></div>`;
  const nameInner = esc(t.name || '—');
  const name = (t.mac_t_id != null)
    ? `<a href="/takim/${t.mac_t_id}-${teamSlug(t.name)}">${nameInner}</a>`
    : nameInner;
  return `<div class="tf-club">${crest}<span class="tf-club-name">${name}</span></div>`;
}

/* ── FEE / OLASILIK RENDER ── */
function feeBlock(r){
  if (r.fee_type === 'free') {
    return `<div class="tf-badge badge-free">Bedelsiz</div>`;
  }
  if (r.fee_type === 'loan') {
    return `<div class="tf-badge badge-loan">Kiralık</div>` +
      (r.market_value_eur ? `<div class="tf-fee-sub">PD ${eur(r.market_value_eur)}</div>` : '');
  }
  if (r.fee_type === 'loan_fee') {
    return `<div class="tf-badge badge-loan">Kiralık</div><div class="tf-fee-sub">${eur(r.fee_eur)}</div>`;
  }
  if (r.fee_type === 'fee' && r.fee_eur) {
    return `<div class="tf-fee-amt">${eur(r.fee_eur)}</div>` +
      (r.market_value_eur ? `<div class="tf-fee-sub">PD ${eur(r.market_value_eur)}</div>` : '');
  }
  return `<div class="tf-badge badge-unknown">Belirsiz</div>`;
}

function probBlock(r){
  let badge;
  if (r.probability == null) {
    badge = `<span class="tf-badge badge-unknown">—</span>`;
  } else {
    const cls = r.probability >= 70 ? 'prob-high' : (r.probability >= 40 ? 'prob-mid' : 'prob-low');
    badge = `<span class="prob-badge ${cls}">%${r.probability}</span>`;
  }
  const dateStr = r.source_date ? new Date(r.source_date).toLocaleDateString('tr-TR', {day:'2-digit',month:'2-digit'}) : '';
  return badge + (dateStr ? `<div class="tf-date">${dateStr}</div>` : '');
}

/* ── LİSTE RENDER ── */
function render(){
  const rows0 = activeTab === 'official' ? transfers : rumours;
  let rows = activeLeague === 'all' ? rows0 : rows0.filter(r => r.league_id === activeLeague);

  if (searchQ) {
    const q = searchQ.toLowerCase();
    rows = rows.filter(r => {
      if ((r.player_name||'').toLowerCase().includes(q)) return true;
      const clubIds = activeTab === 'official' ? [r.from_club_id, r.to_club_id] : [r.current_club_id, r.interested_club_id];
      return clubIds.some(id => teamMap[id] && teamMap[id].name && teamMap[id].name.toLowerCase().includes(q));
    });
  }

  const container = document.getElementById('listContent');
  if (rows.length === 0) {
    container.innerHTML = `<div class="tf-card"><div class="state-box"><div class="icon">📭</div><p>Bu filtre için kayıt bulunamadı.</p></div></div>`;
    return;
  }

  let html = `<div class="tf-card">`;
  const showChip = activeLeague === 'all';

  for (const r of rows) {
    const chip = showChip ? `<div class="tf-league-chip">${esc((LEAGUE_MAP[r.league_id]||{}).flag || r.league_id)}</div>` : '';

    if (activeTab === 'official') {
      html += `<div class="tf-row">
        ${chip}
        ${playerCell(r)}
        <div class="tf-clubs">
          ${clubCell(r.from_club_id)}
          <svg class="tf-arrow" width="16" height="10" viewBox="0 0 16 10" fill="none"><path d="M1 5h13M9 1l5 4-5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ${clubCell(r.to_club_id)}
        </div>
        <div class="tf-right">${feeBlock(r)}</div>
      </div>`;
    } else {
      html += `<div class="tf-row">
        ${chip}
        ${playerCell(r)}
        <div class="tf-clubs">
          ${clubCell(r.current_club_id)}
          <svg class="tf-arrow" width="16" height="10" viewBox="0 0 16 10" fill="none"><path d="M1 5h13M9 1l5 4-5 4" stroke-dasharray="2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ${clubCell(r.interested_club_id)}
        </div>
        <div class="tf-right">${probBlock(r)}</div>
      </div>`;
    }
  }
  html += `</div>`;
  container.innerHTML = html;
}

/* ── ARAMA ── */
document.getElementById('leagueSearch').addEventListener('input', function(){
  buildLeagueList(this.value);
});
document.getElementById('playerSearch').addEventListener('input', function(){
  searchQ = this.value.trim();
  render();
});

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<title>ScorePop</title>
<script>
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;
  window.location.replace(
    '/?p=' + encodeURIComponent(path) +
    (search ? '&' + search.slice(1) : '') +
    (hash || '')
  );
</script>
</head>
<body></body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<title>ScorePop</title>
<script>
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;

  // puan-durumu: GitHub Pages fiziksel klasörü var, trailing slash ile git
  if (path === '/puan-durumu' || path === '/puan-durumu/') {
    window.location.replace('/puan-durumu/');
  }
  // tahmin: GitHub Pages fiziksel klasörü var, trailing slash ile git
  else if (path === '/tahmin' || path === '/tahmin/') {
    window.location.replace('/tahmin/');
  }
  // wc-2026: GitHub Pages fiziksel klasörü var, trailing slash ile git
  else if (path === '/wc-2026' || path === '/wc-2026/') {
    window.location.replace('/wc-2026/');
  }
  // hakkimizda ve iletisim: klasör içi index.html var
  else if (path === '/hakkimizda' || path === '/hakkimizda/') {
    window.location.replace('/hakkimizda/');
  }
  else if (path === '/iletisim' || path === '/iletisim/') {
    window.location.replace('/iletisim/');
  }
  // Diğer tüm URL'ler: SPA trick — index.html router'a gönder
  else {
    window.location.replace(
      '/?p=' + encodeURIComponent(path) +
      (search ? '&' + search.slice(1) : '') +
      (hash || '')
    );
  }
</script>
</head>
<body></body>
</html>

<html lang="tr">
<head>

<meta charset="UTF-8"/>

<meta name="description" content="Canlı basketbol skorları, NBA, EuroLeague ve daha fazlası — anlık sonuçlar."/>

<style>
/* ── BASKETBALL SPECIFIC STYLES ─────────────────────── */

/* Date strip */
.bball-date-wrap {
  padding: 0 16px;
  border-bottom: 1px solid var(--b1);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 10;
}
#bball-date-strip {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding: 8px 0;
  scrollbar-width: none;
}
#bball-date-strip::-webkit-scrollbar { display: none; }
.bdp {
  flex-shrink: 0;
  padding: 5px 10px;
  background: var(--b1);
  color: var(--tx2);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .15s;
  font-family: 'Barlow', sans-serif;
}
.bdp:hover { background: var(--b2); color: var(--tx1); }
.bdp.active { background: var(--or2); color: var(--or); border-color: rgba(242,100,25,.3); }

/* League group */
.bball-grp { margin-bottom: 0; }
.bball-hdr {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  background: var(--bg2);
  cursor: pointer;
  border-top: 1px solid var(--b1);
  user-select: none;
  transition: background .12s;
}
.bball-hdr:hover { background: var(--bg3); }
.bball-sport-icon { font-size: 14px; flex-shrink: 0; }
.bball-hdr-name { font-size: 12.5px; font-weight: 600; color: var(--tx1); flex: 1; letter-spacing: .3px; }
.bball-live-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 6px;
  background: rgba(244,63,94,.15);
  color: var(--live);
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .5px;
  flex-shrink: 0;
}
.bball-arrow { color: var(--tx3); font-size: 12px; flex-shrink: 0; transition: transform .2s; }
.bball-grp.closed .bball-arrow { transform: rotate(-90deg); }
.bball-grp.closed .bball-body { display: none; }

/* Match row */
.bball-mr {
  display: grid;
  grid-template-columns: 64px 1fr auto 1fr 20px;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border-top: 1px solid var(--b1);
  cursor: pointer;
  transition: background .12s;
  position: relative;
}
.bball-mr::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  transition: width .15s, background .15s;
}
.bball-mr:hover { background: var(--bg3); }
.bball-mr:hover::after { width: 2px; background: var(--b3); }
.bball-mr.is-live { background: var(--bg2); }
.bball-mr.is-live::after { width: 3px !important; background: var(--live); box-shadow: 1px 0 8px var(--live-gl); }

/* Status cell */
.bball-status {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 0;
}
.bball-st-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  line-height: 1;
}
.bball-status.live .bball-st-label { color: var(--live); }
.bball-status.done .bball-st-label { color: var(--tx3); }
.bball-status.sched .bball-st-label { color: var(--tx2); }

/* Team cells */
.bball-team {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
  overflow: hidden;
}
.bball-home { justify-content: flex-end; }
.bball-away { justify-content: flex-start; }
.bball-home .bball-logo-wrap { order: 2; flex-shrink: 0; }
.bball-away .bball-logo-wrap { order: 1; flex-shrink: 0; }
.bball-tname {
  font-size: 13px;
  font-weight: 500;
  color: var(--tx1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bball-home .bball-tname { text-align: right; }
.bball-away .bball-tname { text-align: left; }
.bball-tname.bball-win { font-weight: 800; color: #fff; }
.bball-tname.bball-loss { color: var(--tx3); font-weight: 400; }

.bball-logo-wrap { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.bball-logo { width: 24px; height: 24px; object-fit: contain; border-radius: 3px; }
.bball-logo-ph { font-size: 16px; line-height: 1; }

/* Score box */
.bball-scorebox {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 80px;
}
.bball-total {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--b1);
  border: 1px solid var(--b2);
  border-radius: 6px;
  padding: 4px 8px;
}
.bball-total.bball-vs { padding: 5px 12px; }
.bball-vs-txt { font-size: 12px; color: var(--tx3); }
.bball-sn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--tx1);
  min-width: 22px;
  text-align: center;
}
.bball-sn.bball-win { color: #fff; }
.bball-sn.bball-loss { color: var(--tx3); }
.bball-sdiv { width: 1px; height: 14px; background: var(--b3); margin: 0 4px; }
.bball-mr.is-live .bball-total { border-color: rgba(244,63,94,.3); }
.bball-mr.is-live .bball-sn { color: var(--live); }

/* Quarter scores */
.bball-qtrs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
}
.bball-qtr {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 1px 5px;
  background: var(--b1);
  border-radius: 4px;
  font-size: 10.5px;
  color: var(--tx3);
  font-family: 'JetBrains Mono', monospace;
}
.bball-qtr.bball-qtr-live {
  background: rgba(244,63,94,.1);
  color: var(--live);
  border: 1px solid rgba(244,63,94,.2);
}
.bball-qtr-lbl { font-size: 9px; font-family: 'Barlow', sans-serif; font-weight: 600; color: var(--tx3); margin-right: 2px; }
.bball-qtr-sep { color: var(--b3); margin: 0 1px; }

.bball-arr { color: var(--tx3); font-size: 16px; text-align: right; }

/* ── DETAIL MODAL ────────────────────────────────────── */
#bball-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 500;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(6px);
  padding: 0;
}
#bball-modal.open { display: flex; }
@media (min-width: 640px) {
  #bball-modal { align-items: center; padding: 16px; }
}
#bball-modal-body {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 540px;
  max-height: 88vh;
  overflow-y: auto;
  padding: 0 0 32px;
  position: relative;
}
@media (min-width: 640px) {
  #bball-modal-body { border-radius: 16px; }
}
.bball-modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: var(--b2);
  border-radius: 50%;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  color: var(--tx2);
  cursor: pointer;
  z-index: 1;
  transition: background .15s, color .15s;
}
.bball-modal-close:hover { background: var(--b3); color: var(--tx1); }

/* ── HERO ── */
.bball-dtl-hero {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 8px;
  align-items: center;
  padding: 32px 20px 20px;
  border-bottom: 1px solid var(--b1);
  background: linear-gradient(180deg, rgba(255,255,255,.02) 0%, transparent 100%);
}
.bball-dtl-team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
}
.bball-dtl-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; }
.bball-dtl-logo-ph { font-size: 36px; line-height: 1; }
.bball-dtl-tname { font-size: 12.5px; font-weight: 700; color: var(--tx1); line-height: 1.3; }
.bball-dtl-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.bball-dtl-score { display: flex; align-items: center; gap: 6px; }
.bball-dtl-sn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px;
  font-weight: 800;
  color: #fff;
  min-width: 40px;
  text-align: center;
}
.bball-dtl-sep { font-family: 'JetBrains Mono', monospace; font-size: 28px; color: var(--b3); }
.bball-dtl-time { font-size: 22px; color: var(--tx2); font-weight: 600; }
.bball-dtl-status {
  font-size: 10.5px; font-weight: 700; letter-spacing: .8px;
  padding: 3px 10px; border-radius: 10px;
}
.bball-dtl-status.live { background: rgba(244,63,94,.15); color: var(--live); }
.bball-dtl-status.done { background: var(--b1); color: var(--tx3); }
.bball-dtl-status.sched { background: var(--b1); color: var(--tx2); }
.bball-dtl-league { font-size: 11px; color: var(--tx3); text-align: center; }

/* ── TABS ── */
.bball-dtabs {
  display: flex;
  border-bottom: 1px solid var(--b1);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 5;
}
.bball-dtab {
  flex: 1;
  padding: 11px 4px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--tx3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  font-family: 'Barlow', sans-serif;
}
.bball-dtab:hover { color: var(--tx1); }
.bball-dtab.active { color: var(--or); border-bottom-color: var(--or); }
.bball-dtab-dim { opacity: .45; }

/* ── PANELS ── */
.bball-tpanel { display: none; }
.bball-tpanel.active { display: block; }

/* ── DETAIL SECTIONS ── */
.bball-dtl-section { padding: 16px 18px 4px; }
.bball-dtl-sh {
  font-size: 10.5px; font-weight: 700; color: var(--tx3);
  letter-spacing: .7px; text-transform: uppercase;
  margin-bottom: 10px;
}

/* ── QUARTER TABLE ── */
.bball-qtr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.bball-qtr-table th {
  color: var(--tx3); font-weight: 600; font-size: 11px;
  padding: 5px 4px; text-align: center;
}
.bball-qtr-table th:first-child { text-align: left; }
.bball-qtr-table td {
  padding: 7px 4px; text-align: center;
  border-bottom: 1px solid var(--b1); color: var(--tx2);
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
}
.bball-qtr-table td:first-child {
  text-align: left; color: var(--tx3); font-size: 11px;
  font-family: 'Barlow', sans-serif; font-weight: 600;
}
.bball-dtl-total td { font-weight: 800; color: var(--tx1) !important; background: var(--b1); font-size: 15px !important; }
.bball-dtl-sub td { color: var(--tx3) !important; font-size: 11.5px !important; font-style: italic; }
.bball-cell-w { color: #fff !important; font-weight: 800 !important; }
.bball-cell-l { color: var(--tx3) !important; }

/* ── STATS BARS ── */
.bball-stat-header {
  display: grid;
  grid-template-columns: 50px 1fr 50px;
  gap: 8px;
  margin-bottom: 8px;
}
.bball-stat-team-lbl {
  font-size: 11px; font-weight: 700; color: var(--tx2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bball-stat-team-lbl.r { text-align: right; }
.bball-stat-row {
  display: grid;
  grid-template-columns: 42px 1fr 42px;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.bball-stat-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
.bball-stat-bar {
  height: 7px; background: var(--b2); border-radius: 4px;
  overflow: hidden; display: flex;
}
.bball-stat-h { background: var(--or); height: 100%; border-radius: 4px 0 0 4px; transition: width .5s ease; }
.bball-stat-a { background: #3b82f6; height: 100%; border-radius: 0 4px 4px 0; }
.bball-stat-lbl { font-size: 10.5px; color: var(--tx3); text-align: center; }
.bball-stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; color: var(--or); font-size: 12px; text-align: left;
}
.bball-stat-r { color: #3b82f6; text-align: right; }

/* ── FORM BADGES ── */
.bball-dtl-forms { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.bball-dtl-flbl { display: block; font-size: 11px; color: var(--tx3); margin-bottom: 6px; font-weight: 600; }
.bball-form-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.bball-form-badge {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 10px; font-weight: 800; flex-shrink: 0;
}
.bball-form-w { background: rgba(16,185,129,.2); color: var(--green); }
.bball-form-l { background: rgba(244,63,94,.15); color: var(--live); }

/* ── H2H ── */
.bball-h2h-list { display: flex; flex-direction: column; gap: 2px; }
.bball-h2h-row {
  display: grid;
  grid-template-columns: 60px 1fr auto 1fr 22px;
  align-items: center;
  gap: 5px;
  padding: 7px 0;
  border-bottom: 1px solid var(--b1);
  font-size: 12px;
}
.bball-h2h-date { color: var(--tx3); font-size: 10.5px; flex-shrink: 0; }
.bball-h2h-team { color: var(--tx2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bball-h2h-team.home { text-align: right; }
.bball-h2h-team.away { text-align: left; }
.bball-h2h-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700; color: var(--tx1);
  text-align: center; white-space: nowrap; flex-shrink: 0;
}
.bball-h2h-ht { font-size: 10px; color: var(--tx3); margin-left: 4px; font-weight: 400; }
.bball-h2h-res {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; font-size: 9.5px; font-weight: 800; flex-shrink: 0;
}
.bball-h2h-w { background: rgba(16,185,129,.2); color: var(--green); }
.bball-h2h-l { background: rgba(244,63,94,.15); color: var(--live); }
.bball-h2h-d { background: var(--b1); color: var(--tx3); }
.bball-h2h-empty { font-size: 12px; color: var(--tx3); padding: 8px 0; font-style: italic; }

/* ── STANDINGS TABLE ── */
.bball-std-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 6px; }
.bball-std-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
  min-width: 340px;
}
.bball-std-table th {
  color: var(--tx3); font-weight: 700; font-size: 10px;
  letter-spacing: .4px; padding: 6px 4px; text-align: center;
  border-bottom: 1px solid var(--b1); white-space: nowrap;
}
.bball-std-table th.bball-std-pos { width: 28px; }
.bball-std-table th.bball-std-team { text-align: left; width: auto; padding-left: 2px; }
.bball-std-table td {
  padding: 7px 4px; text-align: center; border-bottom: 1px solid var(--b1);
  color: var(--tx2); font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
}
.bball-std-table td.bball-std-pos-cell {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 12px; color: var(--tx3);
  display: flex; align-items: center; gap: 3px; justify-content: center;
  border-bottom: 1px solid var(--b1); padding: 7px 4px;
}
.bball-std-table td.bball-std-team-cell {
  text-align: left; padding-left: 2px;
  font-family: 'Barlow', sans-serif; color: var(--tx1);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; gap: 5px;
}
.bball-std-tname { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.bball-std-logo { width: 16px; height: 16px; object-fit: contain; border-radius: 2px; flex-shrink: 0; }
.bball-std-g { color: var(--green) !important; }
.bball-std-m { color: var(--live) !important; opacity: .8; }
.bball-std-pct { font-weight: 700 !important; color: var(--tx1) !important; }
.bball-std-pos { color: var(--or) !important; font-weight: 700 !important; }
.bball-std-neg { color: var(--live) !important; opacity: .8; }
.bball-std-dot {
  width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; display: inline-block;
}
.bball-std-promo { background: var(--green); }
.bball-std-qual  { background: #f59e0b; }
/* Highlight rows for the two teams */
.bball-std-home td, .bball-std-home td.bball-std-pos-cell,
.bball-std-home td.bball-std-team-cell {
  background: rgba(242,100,25,.08);
}
.bball-std-away td, .bball-std-away td.bball-std-pos-cell,
.bball-std-away td.bball-std-team-cell {
  background: rgba(59,130,246,.08);
}
.bball-std-legend {
  display: flex; gap: 12px; margin-top: 8px;
  font-size: 10.5px; color: var(--tx3);
}
.bball-std-legend span { display: flex; align-items: center; gap: 4px; }

/* Empty / loading */
.bball-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 60px 20px;
  color: var(--tx3);
  font-size: 14px;
}
.bball-empty-icon { font-size: 32px; }

/* Modal open: prevent body scroll */
body.modal-open { overflow: hidden; }

/* Live tab indicator */
.bball-live-tab-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--live);
  border-radius: 50%;
  margin-right: 4px;
  animation: bball-pulse 1.4s infinite;
}
@keyframes bball-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .3; }
}

/* Topbar live badge */
#bball-tb-live {
  display: none;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  background: rgba(244,63,94,.12);
  border: 1px solid rgba(244,63,94,.25);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--live);
}
.bball-tb-dot {
  width: 5px; height: 5px;
  background: var(--live);
  border-radius: 50%;
  animation: bball-pulse 1.4s infinite;
}

/* Responsive */
@media (max-width: 600px) {
  .bball-mr { grid-template-columns: 52px 1fr auto 1fr 16px; gap: 4px; padding: 8px 12px; }
  .bball-sn { font-size: 14px; }
  .bball-tname { font-size: 12px; }
  .bball-scorebox { min-width: 68px; }
  .bball-dtl-score { font-size: 26px; }
}

/* Sidebar sport tabs for basketball */
.sb-sport-badge {
  font-size: 9.5px;
  font-weight: 700;
  background: var(--or2);
  color: var(--or);
  padding: 1px 5px;
  border-radius: 4px;
  margin-left: auto;
}
</style>
</head>

<body>

<!-- ── SIDEBAR ───────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sb-top">
    <a class="sb-brand" href="/" style="text-decoration:none;cursor:pointer;">
      <div class="sb-mark"><img src="https://i.hizliresim.com/gbleupf.png" alt="ScorePop Logo"></div>
      <div class="sb-name">SCORE<em>POP</em></div>
    </a>
    <div class="sb-live-stat">
      <span class="sb-live-dot"></span>
      <span id="sb-bball-live-n">0</span>
      <span class="sb-live-lbl">maç canlı</span>
    </div>
  </div>

  <nav class="sb-nav">
    <!-- Futbol (ana sayfa) -->
    <a class="sb-btn" href="/" style="text-decoration:none;">
      <span style="font-size:14px;flex-shrink:0">⚽</span>
      <span>Futbol</span>
    </a>
    <!-- Basketbol (aktif) -->
    <button class="sb-btn active" style="pointer-events:none">

<!-- ── MAIN ──────────────────────────────────────────── -->
<main id="main">

      <button class="tb-menu" onclick="toggleSidebar()">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M0 1h16M0 6h16M0 11h16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

      </button>

      </span>
    </div>
    <div style="flex:1;overflow:hidden;"></div>
    <div class="tb-right">
      <div id="bball-tb-live">
        <span class="bball-tb-dot"></span>
        <b id="bball-tb-live-n">0</b>
        <span>CANLI</span>
      </div>
    </div>
  </header>

  <!-- Col headers (basketball layout) -->
  <div class="col-hdr" id="bball-col-hdr" style="grid-template-columns:64px 1fr 100px 1fr 20px;gap:6px;">
    <div class="ch-time">DURUM</div>
    <div class="ch-home" style="text-align:right;padding-right:8px;">EV SAHİBİ</div>
    <div class="ch-score" style="text-align:center;">SKOR</div>
    <div class="ch-away" style="text-align:left;padding-left:8px;">DEPLASMAN</div>

  </div>

  <!-- Date navigation -->
  <div class="bball-date-wrap">
    <div id="bball-date-strip"></div>
  </div>

  <!-- Matches list -->
  <div id="view-bball">

      <!-- Skeleton loader -->
      <div class="skel">
        <div class="sk-h"></div><div class="sk-r"></div><div class="sk-r"></div><div class="sk-r"></div>
        <div class="sk-h" style="margin-top:8px"></div><div class="sk-r"></div><div class="sk-r"></div>
      </div>
    </div>
  </div>

</main><!-- /main -->

<!-- ── DETAIL MODAL ──────────────────────────────────── -->
<div id="bball-modal">
  <div id="bball-modal-body" role="dialog" aria-modal="true" aria-label="Maç Detayı">
    <button class="bball-modal-close" onclick="closeBballModal()" aria-label="Kapat">✕</button>
    <!-- Hero + Tabs + Panels injected by renderBballModal() -->
  </div>
</div>

<!-- ── SIDEBAR TOGGLE (mobile) ──────────────────────── -->
<div id="overlay" onclick="toggleSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;"></div>

<script>
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const open = sb.classList.toggle('sb-open');
  ov.style.display = open ? 'block' : 'none';
}
</script>

<script src="/config.js"></script>
<script src="/basketbol/bball.js"></script>

<style>
/* ═══════════════════════════════════════════════════════
   BASKETBOL DETAY SAYFASI
   /basketbol/mac/[id]-slug
═══════════════════════════════════════════════════════ */

/* ── TOPBAR BACK BUTTON ── */
.bd-back {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px 0 12px;
  height: 36px;
  background: var(--b1);
  border-radius: 8px;
  color: var(--tx2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: background .12s, color .12s;
  flex-shrink: 0;
  font-family: 'Barlow', sans-serif;
}
.bd-back:hover { background: var(--b2); color: var(--tx1); }
.bd-back svg { flex-shrink: 0; }

/* ── HERO ── */
.bd-hero {
  background: var(--bg2);
  border-bottom: 1px solid var(--b1);
}
.bd-league {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 14px 20px 0;
}
.bd-league-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: .5px;
}

.bd-matchup {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: center;
  padding: 20px 20px 22px;
}

.bd-team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
}

.bd-logo-wrap {
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bd-logo {
  width: 64px;
  height: 64px;
  object-fit: contain;
  border-radius: 10px;
  drop-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.bd-logo-ph { font-size: 48px; line-height: 1; }

.bd-tname {
  font-size: 14px;
  font-weight: 700;
  color: var(--tx1);
  line-height: 1.25;
  max-width: 130px;
}

.bd-form {
  display: flex;
  gap: 3px;
  justify-content: center;
  flex-wrap: wrap;
}
.bd-fb {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 9px; font-weight: 800; flex-shrink: 0;
}
.bd-fb.w { background: rgba(16,185,129,.2); color: var(--green); }
.bd-fb.l { background: rgba(244,63,94,.15); color: var(--live); }

/* Center section */
.bd-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 110px;
}

.bd-score-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--tx2);
}

.bd-score-box {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 12px;
  padding: 10px 14px;
}
.bd-score-box.live {
  border-color: rgba(244,63,94,.3);
  box-shadow: 0 0 16px rgba(244,63,94,.08);
}
.bd-sn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 800;
  color: var(--tx1);
  min-width: 34px;
  text-align: center;
  line-height: 1;
}
.bd-sn.bd-win  { color: #fff; }
.bd-sn.bd-loss { color: var(--tx3); }
.bd-sep {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  color: var(--b3);
  line-height: 1;
}
.bd-score-box.live .bd-sn { color: var(--live); }

/* Status badge */
.bd-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.bd-badge.live   { background: rgba(244,63,94,.15); color: var(--live); }
.bd-badge.done   { background: var(--b1); color: var(--tx3); }
.bd-badge.sched  { background: var(--b1); color: var(--tx2); }
.bd-badge-dot {
  width: 6px; height: 6px;
  background: var(--live);
  border-radius: 50%;
  animation: bd-pulse 1.2s infinite;
}
@keyframes bd-pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Quarter strip */
.bd-qstrip {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
}
.bd-qchip {
  padding: 3px 7px;
  background: var(--b1);
  border-radius: 5px;
  font-size: 11px;
  color: var(--tx3);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}
.bd-qchip b {
  font-family: 'Barlow', sans-serif;
  font-size: 9px;
  font-weight: 700;
  color: var(--tx3);
  margin-right: 3px;
}
.bd-qchip.active {
  background: rgba(244,63,94,.1);
  color: var(--live);
  border: 1px solid rgba(244,63,94,.2);
}
.bd-qchip.active b { color: var(--live); }

/* ── TABS ── */
.bd-tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--b1);
  position: sticky;
  top: 0;
  z-index: 20;
}
.bd-tab {
  flex: 1;
  padding: 13px 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--tx3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  font-family: 'Barlow', sans-serif;
  white-space: nowrap;
}
.bd-tab:hover { color: var(--tx1); }
.bd-tab.active { color: var(--or); border-bottom-color: var(--or); }
.bd-tab.dim { opacity: .4; }

/* ── PANELS ── */
.bd-panel { display: none; }
.bd-panel.active { display: block; }

/* ── SECTIONS ── */
.bd-section { padding: 18px 20px 6px; }
.bd-sh {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--tx3);
  letter-spacing: .7px;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--b1);
}

/* ── QUARTER TABLE ── */
.bd-qtr-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.bd-qtr-table th {
  color: var(--tx3);
  font-weight: 600;
  font-size: 11px;
  padding: 6px 6px;
  text-align: center;
  border-bottom: 1px solid var(--b1);
}
.bd-qtr-table th:first-child { text-align: left; }
.bd-qtr-table td {
  padding: 9px 6px;
  text-align: center;
  border-bottom: 1px solid var(--b1);
  color: var(--tx2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
}
.bd-qtr-table td:first-child {
  text-align: left;
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--tx3);
}
.bd-tr-total td {
  font-weight: 800 !important;
  font-size: 15px !important;
  color: var(--tx1) !important;
  background: var(--b1);
}
.bd-tr-sub td {
  color: var(--tx3) !important;
  font-size: 12px !important;
  font-style: italic;
}
.bd-cell-w { color: #fff !important; font-weight: 800 !important; }
.bd-cell-l { color: var(--tx3) !important; }

/* ── STATS ── */
.bd-stat-hdr {
  display: grid;
  grid-template-columns: 1fr 100px 1fr;
  gap: 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--tx2);
  margin-bottom: 10px;
  text-align: left;
}
.bd-stat-row {
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.bd-sv {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 13px;
}
.bd-sv.home { color: var(--or); text-align: left; }
.bd-sv.away { color: #3b82f6; text-align: right; }
.bd-sb-wrap { display: flex; flex-direction: column; gap: 4px; }
.bd-sb {
  height: 8px;
  background: var(--b2);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
}
.bd-sb-h { background: var(--or);  border-radius: 4px 0 0 4px; transition: width .5s; }
.bd-sb-a { background: #3b82f6; border-radius: 0 4px 4px 0; }
.bd-sl {
  font-size: 10.5px;
  color: var(--tx3);
  text-align: center;
}

/* ── H2H ── */
.bd-h2h-list { display: flex; flex-direction: column; }
.bd-h2h-row {
  display: grid;
  grid-template-columns: 1fr 22px;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--b1);
}
.bd-h2h-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 3px;
}
.bd-h2h-date {
  font-size: 10.5px;
  color: var(--tx3);
  flex-shrink: 0;
}
.bd-h2h-league {
  font-size: 10px;
  color: var(--tx3);
  background: var(--b1);
  padding: 1px 5px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px;
}
.bd-h2h-match {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 6px;
  align-items: center;
  font-size: 12.5px;
}
.bd-h2h-t {
  color: var(--tx2);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bd-h2h-t.home { text-align: right; }
.bd-h2h-t.away { text-align: left; }
.bd-h2h-sc {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--tx1);
  text-align: center;
  white-space: nowrap;
  flex-shrink: 0;
}
.bd-h2h-ht { font-size: 10px; color: var(--tx3); font-weight: 400; margin-left: 4px; }
.bd-h2h-res {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 5px;
  font-size: 10px; font-weight: 800;
  flex-shrink: 0; align-self: center;
}
.bd-h2h-res.w { background: rgba(16,185,129,.2); color: var(--green); }
.bd-h2h-res.l { background: rgba(244,63,94,.15); color: var(--live); }
.bd-h2h-res.d { background: var(--b1); color: var(--tx3); }
.bd-h2h-empty { font-size: 12px; color: var(--tx3); font-style: italic; padding: 6px 0; }

/* ── STANDINGS ── */
.bd-std-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 4px; }
.bd-std-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 360px;
}
.bd-std-table th {
  color: var(--tx3);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  padding: 7px 5px;
  text-align: center;
  border-bottom: 1px solid var(--b1);
  white-space: nowrap;
}
.bd-std-table th.l { text-align: left; }
.bd-std-table td {
  padding: 8px 5px;
  text-align: center;
  border-bottom: 1px solid var(--b1);
  color: var(--tx2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.bd-std-table td.pos-cell {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--tx3);
  display: flex;
  align-items: center;
  gap: 3px;
  justify-content: center;
  border-bottom: 1px solid var(--b1);
  padding: 8px 5px;
}
.bd-std-table td.team-cell {
  text-align: left;
  font-family: 'Barlow', sans-serif;
  color: var(--tx1);
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--b1);
  padding: 8px 5px;
}
.td-tname { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
.td-logo { width: 18px; height: 18px; object-fit: contain; border-radius: 2px; flex-shrink: 0; }
.td-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.dot-playoff { background: var(--green); }
.dot-qual    { background: #f59e0b; }
.bd-std-table td.g   { color: var(--green) !important; font-weight: 700; }
.bd-std-table td.m   { color: var(--live) !important; opacity: .8; }
.bd-std-table td.pct { color: var(--tx1) !important; font-weight: 700; }
.bd-std-table td.pos { color: var(--or) !important; font-weight: 700; }
.bd-std-table td.neg { color: var(--live) !important; opacity: .8; }
/* Highlighted rows */
.bd-std-table tr.row-h td, .bd-std-table tr.row-h td.pos-cell, .bd-std-table tr.row-h td.team-cell { background: rgba(242,100,25,.08); }
.bd-std-table tr.row-a td, .bd-std-table tr.row-a td.pos-cell, .bd-std-table tr.row-a td.team-cell { background: rgba(59,130,246,.08); }
.bd-legend {
  display: flex; gap: 14px; font-size: 10.5px; color: var(--tx3);
  margin-top: 8px; flex-wrap: wrap;
}
.bd-legend span { display: flex; align-items: center; gap: 4px; }

/* ── EMPTY / LOADING ── */
.bd-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 50px 20px;
  color: var(--tx3);
  font-size: 14px;
  text-align: center;
}
.bd-ei { font-size: 36px; }

.bd-init-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 80px 20px;
  color: var(--tx3);
  font-size: 14px;
}
.bd-spin {
  width: 36px; height: 36px;
  border: 3px solid var(--b2);
  border-top-color: var(--or);
  border-radius: 50%;
  animation: bd-spin .7s linear infinite;
}
@keyframes bd-spin { to { transform: rotate(360deg); } }

.bd-init-error {
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; padding: 60px 20px; color: var(--tx2); font-size: 14px; text-align: center;
}
.bd-back-btn {
  margin-top: 8px;
  padding: 10px 20px;
  background: var(--b1);
  border-radius: 8px;
  color: var(--tx1);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: background .15s;
  font-family: 'Barlow', sans-serif;
}
.bd-back-btn:hover { background: var(--b2); }

/* ── SIDEBAR badge ── */
.sb-sport-badge {
  font-size: 9.5px;
  font-weight: 700;
  background: var(--or2);
  color: var(--or);
  padding: 1px 5px;
  border-radius: 4px;
  margin-left: auto;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .bd-logo-wrap { width: 48px; height: 48px; }
  .bd-logo, .bd-logo-ph { width: 48px; height: 48px; font-size: 36px; }
  .bd-tname { font-size: 12.5px; max-width: 100px; }
  .bd-sn { font-size: 26px; min-width: 28px; }
  .bd-matchup { gap: 6px; padding: 16px 14px 18px; }
  .bd-section { padding: 14px 14px 6px; }
  .bd-tab { font-size: 12px; padding: 12px 4px; }
}
</style>
</head>
